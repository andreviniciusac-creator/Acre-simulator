<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ACRE SIMULATOR — A Lenda do Rex Rei</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#04050a;overflow:hidden}
  body{display:flex;align-items:center;justify-content:center}
  canvas{display:block;border-radius:4px;box-shadow:0 0 90px rgba(0,0,0,.9);cursor:default;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
/* ============================================================
   ACRE SIMULATOR — A Lenda do Rex Rei
   Um jogo em um arquivo só. Tudo aqui é desenhado e tocado
   proceduralmente: zero imagens, zero áudio externo.
   ============================================================ */
const W=960, H=540, GY=462, TAU=Math.PI*2;
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const s=Math.min(window.innerWidth/W, window.innerHeight/H);
  cv.width=Math.max(2,Math.round(W*s*dpr)); cv.height=Math.max(2,Math.round(H*s*dpr));
  cv.style.width=Math.round(W*s)+'px'; cv.style.height=Math.round(H*s)+'px';
  ctx.setTransform(cv.width/W,0,0,cv.height/H,0,0);
}
window.addEventListener('resize',resize);
// recuperação de perda de contexto da GPU (tela branca no Chrome/Windows)
cv.addEventListener('contextlost',e=>{e.preventDefault();});
cv.addEventListener('contextrestored',()=>{
  try{for(const k in glowCache)delete glowCache[k];resize();if(sceneName)setScene(sceneName);}catch(_e){}
});

/* ---------------- util ---------------- */
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const ease=t=>t*t*(3-2*t);
const rnd=(a=1,b)=>b===undefined?Math.random()*a:a+Math.random()*(b-a);
const irnd=(a,b)=>Math.floor(rnd(a,b+1));
function sr(seed){let s=seed>>>0;return()=>{s=(s+0x6D2B79F5)|0;let t=Math.imul(s^(s>>>15),1|s);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function txt(s,x,y,o={}){ctx.save();ctx.font=(o.w||'700')+' '+(o.s||16)+'px '+(o.f||"'Segoe UI',Verdana,sans-serif");ctx.textAlign=o.a||'center';ctx.textBaseline=o.b||'middle';ctx.globalAlpha=o.al===undefined?1:o.al;if(o.st){ctx.lineWidth=o.stw||4;ctx.strokeStyle=o.st;ctx.lineJoin='round';ctx.strokeText(s,x,y);}ctx.fillStyle=o.c||'#fff';ctx.fillText(s,x,y);ctx.restore();}
function wrapTxt(s,maxW){const ws=s.split(' ');const L=[];let cur='';for(const w of ws){const t=cur?cur+' '+w:w;if(ctx.measureText(t).width>maxW&&cur){L.push(cur);cur=w;}else cur=t;}if(cur)L.push(cur);return L;}
const ovl=(a,b)=>a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
function makeCanvas(w,h){const c=document.createElement('canvas');c.width=w;c.height=h;return c;}
function makeLayer(w,h,fn){const c=makeCanvas(w,h);fn(c.getContext('2d'),w,h);return c;}
function drawLayer(img,px,y=0,alpha=1){const w=img.width;let ox=(-px)%w;if(ox>0)ox-=w;ctx.globalAlpha=alpha;for(let x=ox;x<W+w;x+=w)ctx.drawImage(img,Math.round(x),y);ctx.globalAlpha=1;}

/* ---------------- input ---------------- */
const K={}, KP={};
window.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();
  audioInit();
  if(!e.repeat){K[e.code]=1;KP[e.code]=1;}
  if(e.code==='KeyM'&&!e.repeat){muted=!muted;if(mGain)mGain.gain.value=muted?0:1;}
  if(e.code==='KeyP'&&!e.repeat)paused=!paused;
  if(e.code==='KeyF'&&!e.repeat){try{document.fullscreenElement?document.exitFullscreen():cv.requestFullscreen();}catch(err){}}
});
window.addEventListener('keyup',e=>K[e.code]=0);
window.addEventListener('blur',()=>{for(const k in K)K[k]=0;});
window.addEventListener('pointerdown',()=>audioInit());
const kd=(...c)=>c.some(x=>K[x]);
const kp=(...c)=>c.some(x=>KP[x]);
const IN={
  left:()=>kd('ArrowLeft','KeyA','V_L'), right:()=>kd('ArrowRight','KeyD','V_R'),
  up:()=>kd('ArrowUp','KeyW','V_U'), down:()=>kd('ArrowDown','KeyS','V_D'),
  jump:()=>kd('Space','ArrowUp','KeyW','V_J'), jumpP:()=>kp('Space','ArrowUp','KeyW','V_J'),
  atkP:()=>kp('KeyX','KeyJ','V_X'), shield:()=>kd('KeyC','KeyL','V_C'),
  dashP:()=>kp('KeyZ','KeyK','ShiftLeft','ShiftRight','V_Z'),
  advP:()=>kp('Space','Enter','KeyX','V_J','V_X')
};
/* ---------------- gamepad (mapeamento padrão: A pula, X ataca, B dash, Y/ombros escudo, Start pausa) ---------------- */
let padPrev={},padOn=false;
function pollPad(){
  const gps=(typeof navigator!=='undefined'&&navigator.getGamepads)?navigator.getGamepads():[];
  let gp=null;for(const g of gps)if(g&&g.connected){gp=g;break;}
  if(!gp){if(padOn){for(const k in padPrev)if(k!=='start')K[k]=0;padPrev={};padOn=false;}return;}
  padOn=true;
  const b=i=>!!(gp.buttons&&gp.buttons[i]&&(gp.buttons[i].pressed||gp.buttons[i].value>.5));
  const ax=i=>(gp.axes&&gp.axes[i])||0;
  const st={
    V_L:b(14)||ax(0)<-.4, V_R:b(15)||ax(0)>.4,
    V_U:b(12)||ax(1)<-.5, V_D:b(13)||ax(1)>.5,
    V_J:b(0), V_X:b(2), V_Z:b(1), V_C:b(3)||b(4)||b(5)||b(6)||b(7)
  };
  for(const k in st){
    if(st[k]&&!padPrev[k]){KP[k]=1;K[k]=1;}
    if(!st[k]&&padPrev[k])K[k]=0;
    padPrev[k]=st[k];}
  if(b(9)&&!padPrev.start)paused=!paused;
  padPrev.start=b(9);
}
/* ---------------- controles de toque (aparecem ao primeiro toque) ---------------- */
let touchUI=false;
const maybeTouch=(typeof navigator!=='undefined'&&navigator.maxTouchPoints>0);
const tPts=new Map();
function touchBtns(){
  const bs=[],sk=player.skills;
  if(sceneName==='chase')bs.push({c:'V_D',x:118,y:462,r:52,l:'▼'});
  else{bs.push({c:'V_L',x:64,y:468,r:44,l:'◀'});bs.push({c:'V_R',x:172,y:468,r:44,l:'▶'});}
  bs.push({c:'V_J',x:882,y:462,r:50,l:'PULO'});
  if(player.hasStick||sk.shot)bs.push({c:'V_X',x:780,y:478,r:38,l:'X'});
  if(sk.dash)bs.push({c:'V_Z',x:756,y:386,r:33,l:'Z'});
  if(sk.shield)bs.push({c:'V_C',x:866,y:368,r:33,l:'C'});
  return bs;
}
function tXY(e){const r=cv.getBoundingClientRect();return[(e.clientX-r.left)/r.width*W,(e.clientY-r.top)/r.height*H];}
cv.addEventListener('pointerdown',e=>{
  if(e.pointerType==='touch'){touchUI=true;e.preventDefault();}
  if(!touchUI)return;
  const[x,y]=tXY(e);let hit=null;
  for(const bt of touchBtns()){const dx=x-bt.x,dy=y-bt.y;if(dx*dx+dy*dy<=bt.r*bt.r*1.35){hit=bt;break;}}
  if(hit){tPts.set(e.pointerId,hit.c);K[hit.c]=1;KP[hit.c]=1;}
  else if(dlg||itemPop||sceneName==='title'||sceneName==='intro'||sceneName==='ending')KP.V_J=1;
},{passive:false});
function tEnd(e){const c=tPts.get(e.pointerId);if(c!==undefined){K[c]=0;tPts.delete(e.pointerId);}}
cv.addEventListener('pointerup',tEnd);cv.addEventListener('pointercancel',tEnd);
function drawTouchUI(){
  if(!touchUI)return;
  ctx.save();
  for(const bt of touchBtns()){
    const on=!!K[bt.c];
    ctx.globalAlpha=on?.44:.2;
    ctx.fillStyle='#0c1220';ctx.beginPath();ctx.arc(bt.x,bt.y,bt.r,0,TAU);ctx.fill();
    ctx.globalAlpha=on?.95:.5;
    ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(bt.x,bt.y,bt.r,0,TAU);ctx.stroke();
    txt(bt.l,bt.x,bt.y+1,{s:bt.r>44?16:15,w:'900',c:'#fff',al:on?1:.75});
  }
  ctx.restore();
}

/* ---------------- áudio (Web Audio, 100% sintetizado) ---------------- */
let AC=null,mGain=null,muGain=null,sfGain=null,noiseBuf=null,muted=false;
function audioInit(){
  if(AC)return;
  try{
    const A=window.AudioContext||window.webkitAudioContext; if(!A)return;
    AC=new A();
    mGain=AC.createGain();mGain.gain.value=muted?0:1;mGain.connect(AC.destination);
    muGain=AC.createGain();muGain.gain.value=.42;muGain.connect(mGain);
    sfGain=AC.createGain();sfGain.gain.value=.85;sfGain.connect(mGain);
    noiseBuf=AC.createBuffer(1,AC.sampleRate,AC.sampleRate);
    const d=noiseBuf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    if(song)nextNote=AC.currentTime+.1;
  }catch(e){AC=null;}
}
function beep(type,f0,f1,dur,vol,when=0,dest){
  if(!AC)return;const t=AC.currentTime+when;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.setValueAtTime(Math.max(20,f0),t);
  if(f1&&f1>0)o.frequency.exponentialRampToValueAtTime(Math.max(20,f1),t+dur);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.006);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g);g.connect(dest||sfGain);o.start(t);o.stop(t+dur+.05);
}
function nz(dur,vol,fType,f0,f1,when=0,Q=1,dest){
  if(!AC)return;const t=AC.currentTime+when;
  const s=AC.createBufferSource();s.buffer=noiseBuf;s.loop=true;
  const f=AC.createBiquadFilter();f.type=fType||'lowpass';f.Q.value=Q;
  f.frequency.setValueAtTime(f0||800,t);
  if(f1)f.frequency.exponentialRampToValueAtTime(Math.max(20,f1),t+dur);
  const g=AC.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.008);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  s.connect(f);f.connect(g);g.connect(dest||sfGain);s.start(t);s.stop(t+dur+.05);
}
function sfx(n){
  if(!AC||muted)return;
  switch(n){
    case 'jump':beep('square',300,540,.14,.15);break;
    case 'land':nz(.06,.12,'lowpass',500,200);break;
    case 'step':nz(.04,.06,'lowpass',600,300);break;
    case 'egg':beep('sine',760,1150,.09,.2);beep('sine',1150,1520,.13,.16,.07);break;
    case 'hurt':beep('sawtooth',320,90,.28,.28);nz(.12,.15,'highpass',900);break;
    case 'bonk':beep('square',240,70,.18,.3);break;
    case 'stomp':nz(.2,.4,'lowpass',160,50);beep('sine',90,34,.3,.5);break;
    case 'roar':nz(1.2,.5,'bandpass',280,80,0,2);beep('sawtooth',150,45,1.1,.4);beep('sawtooth',95,38,1.1,.3,.05);break;
    case 'roar2':nz(1.5,.6,'bandpass',350,70,0,2);beep('sawtooth',180,40,1.4,.5);beep('square',60,28,1.4,.35,.04);break;
    case 'swing':nz(.09,.18,'highpass',1400,2400);break;
    case 'hit':beep('square',160,55,.13,.32);nz(.09,.25,'highpass',700);break;
    case 'shot':beep('square',900,240,.17,.2);nz(.06,.09,'highpass',2400);break;
    case 'magic':[523,659,784,1046].forEach((f,i)=>beep('sine',f,f*1.01,.22,.14,i*.06));break;
    case 'shield':beep('triangle',1250,880,.18,.16);break;
    case 'reflect':beep('square',640,1500,.16,.26);beep('sine',1500,2000,.1,.15,.05);break;
    case 'dash':nz(.2,.25,'bandpass',1100,300,0,2);break;
    case 'blip':beep('square',940,940,.03,.06);break;
    case 'item':[392,523,659,784,1046].forEach((f,i)=>beep('square',f,f,.16,.13,i*.11));break;
    case 'win':[523,659,784,1046,1318,1568].forEach((f,i)=>beep('square',f,f,.3,.13,i*.13));break;
    case 'thunder':nz(1.6,.5,'lowpass',220,45,.05);nz(.25,.3,'highpass',3000,800);break;
    case 'crack':nz(.12,.35,'bandpass',2600,1200);break;
    case 'rock':nz(.3,.35,'lowpass',300,90);break;
    case 'heal':beep('sine',660,990,.25,.18);beep('sine',990,1320,.3,.14,.12);break;
    case 'grr':nz(.4,.3,'bandpass',200,120,0,3);beep('sawtooth',110,70,.4,.25);break;
    case 'cry':beep('sine',900,400,.5,.16);beep('sine',700,300,.6,.14,.3);break;
    case 'squawk':beep('square',800,1400,.08,.18);beep('square',1400,600,.1,.16,.08);break;
  }
}
/* --- música procedural: sequenciador 16 steps --- */
const N=(o,s)=>o*Math.pow(2,s/12); // freq relativa
const SONGS={
  title:{bpm:84,root:196,dr:'k..h..h.k..h..h.',bs:[0,null,null,null,-5,null,null,null,3,null,null,null,-2,null,null,null],ld:[12,null,15,null,19,null,15,null,12,null,10,null,7,null,null,null],lt:'triangle',pd:[[0,7,12],[-5,7,10]],lv:.09},
  forest:{bpm:104,root:220,dr:'k.h.s.h.k.h.s.hh',bs:[0,null,0,null,5,null,5,null,7,null,7,null,3,null,5,null],ld:[12,null,null,14,15,null,12,null,null,null,19,null,17,15,null,null],lt:'square',pd:[[0,4,7],[5,9,12]],lv:.07},
  chase:{bpm:152,root:174.6,dr:'kkhskhhskkhskhss',bs:[0,0,null,0,0,null,-2,null,-4,-4,null,-4,-5,null,-5,null],ld:[12,null,12,null,11,null,12,15,null,15,null,14,null,12,null,11],lt:'sawtooth',pd:[[0,3,7],[-4,3,5]],lv:.08},
  cave:{bpm:80,root:130.8,dr:'k.......h...s...',bs:[0,null,null,null,null,null,null,null,-1,null,null,null,null,null,null,null],ld:[null,null,12,null,null,null,null,null,null,15,null,null,13,null,null,null],lt:'sine',pd:[[0,3,7],[0,2,6]],lv:.09},
  mystic:{bpm:70,root:261.6,dr:'................',bs:[0,null,null,null,null,null,7,null,5,null,null,null,null,null,3,null],ld:[12,null,null,16,null,null,19,null,null,null,24,null,19,null,16,null],lt:'sine',pd:[[0,4,7,11],[5,9,14,16]],lv:.1},
  train:{bpm:118,root:220,dr:'k.h.s.h.k.hhs.h.',bs:[0,null,7,null,5,null,7,null,0,null,7,null,8,null,7,null],ld:[12,14,15,null,19,null,15,null,17,null,15,14,12,null,null,null],lt:'square',pd:[[0,4,7],[5,9,12]],lv:.07},
  boss:{bpm:140,root:146.8,dr:'kshskshhkshskkss',bs:[0,null,0,0,null,0,-2,null,-4,null,-4,-4,null,-5,-5,null],ld:[12,null,11,12,null,15,null,14,null,12,null,11,null,8,null,11],lt:'sawtooth',pd:[[0,3,7],[-2,2,5]],lv:.09},
  boss2:{bpm:156,root:155.6,dr:'kshskshhksshksss',bs:[0,0,null,0,-2,null,-2,null,-4,-4,null,-4,-7,null,-5,null],ld:[12,15,null,12,null,17,15,null,12,15,null,19,null,17,null,15],lt:'sawtooth',pd:[[0,3,7],[-4,0,3]],lv:.1},
  win:{bpm:96,root:261.6,dr:'k.h.s.h.k.h.s.h.',bs:[0,null,null,null,5,null,null,null,7,null,null,null,5,null,7,null],ld:[12,null,16,19,null,19,null,16,17,null,16,null,12,null,null,null],lt:'triangle',pd:[[0,4,7],[5,9,12]],lv:.09},
};
let song=null,songStep=0,nextNote=0,songName='';
function musicSet(n){
  if(songName===n)return;songName=n;song=SONGS[n]||null;songStep=0;
  if(AC&&song)nextNote=AC.currentTime+.06;
}
function schedStep(s,i,t){
  const spb=60/s.bpm/4, root=s.root;
  const dc=s.dr[i%s.dr.length];
  if(dc==='k'){beep('sine',150,42,.13,.42,t-AC.currentTime,muGain);}
  if(dc==='s'){nz(.12,.2,'bandpass',1800,900,t-AC.currentTime,1,muGain);beep('triangle',190,120,.08,.12,t-AC.currentTime,muGain);}
  if(dc==='h'){nz(.035,.08,'highpass',7000,6000,t-AC.currentTime,1,muGain);}
  const bs=s.bs[i%s.bs.length];
  if(bs!==null&&bs!==undefined)beep('triangle',N(root/2,bs),0,spb*1.8,.22,t-AC.currentTime,muGain);
  const ld=s.ld[i%s.ld.length];
  if(ld!==null&&ld!==undefined)beep(s.lt,N(root,ld),0,spb*1.6,s.lv,t-AC.currentTime,muGain);
  if(i%16===0&&s.pd){const ch=s.pd[(i/16|0)%s.pd.length];for(const sm of ch)beep('sine',N(root,sm),0,spb*15,.04,t-AC.currentTime,muGain);}
}
function musicTick(){
  if(!AC||!song||muted)return;
  const spb=60/song.bpm/4;
  if(nextNote<AC.currentTime-.5)nextNote=AC.currentTime+.05;
  while(nextNote<AC.currentTime+.14){schedStep(song,songStep,nextNote);songStep++;nextNote+=spb;}
}

/* ---------------- partículas ---------------- */
let P=[];
function puff(o){
  if(P.length>560)P.splice(0,60);
  P.push(Object.assign({x:0,y:0,vx:0,vy:0,g:0,dr:0,r:3,r2:0,life:.6,t:0,col:'#fff',add:false,shape:0,rot:0,vr:0,front:true,al:1},o));
}
function updP(dt){
  for(let i=P.length-1;i>=0;i--){const p=P[i];p.t+=dt;
    if(p.t>=p.life){P.splice(i,1);continue;}
    p.vy+=p.g*dt;const d=1-Math.min(1,p.dr*dt);p.vx*=d;p.vy*=d;
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.rot+=p.vr*dt;}
}
function drawP(front){
  for(const p of P){
    if(!!p.front!==!!front)continue;
    const k=1-p.t/p.life;ctx.globalAlpha=k*p.al;
    if(p.add)ctx.globalCompositeOperation='lighter';
    ctx.fillStyle=p.col;
    if(p.shape===0){ctx.beginPath();ctx.arc(p.x,p.y,p.r*(0.4+0.6*k),0,TAU);ctx.fill();}
    else if(p.shape===1){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.beginPath();ctx.ellipse(0,0,p.r,p.r*.45,0,0,TAU);ctx.fill();ctx.restore();}
    else if(p.shape===2){ctx.strokeStyle=p.col;ctx.lineWidth=Math.max(1,p.r*.4);ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.vx*.045,p.y-p.vy*.045);ctx.stroke();}
    else if(p.shape===3){ctx.strokeStyle=p.col;ctx.lineWidth=3*k;ctx.beginPath();ctx.arc(p.x,p.y,lerp(p.r,p.r2,ease(p.t/p.life)),0,TAU);ctx.stroke();}
    else if(p.shape===4){drawGlowRaw(p.x,p.y,p.r*(0.5+0.5*k),p.col,k*p.al);}
    ctx.globalCompositeOperation='source-over';
  }
  ctx.globalAlpha=1;
}
/* glow barato: sprite radial cacheado */
const glowCache={};
function glowImg(rgb){
  if(glowCache[rgb])return glowCache[rgb];
  const c=makeCanvas(64,64),g=c.getContext('2d');
  const gr=g.createRadialGradient(32,32,0,32,32,32);
  gr.addColorStop(0,'rgba('+rgb+',1)');gr.addColorStop(.4,'rgba('+rgb+',.32)');gr.addColorStop(1,'rgba('+rgb+',0)');
  g.fillStyle=gr;g.fillRect(0,0,64,64);glowCache[rgb]=c;return c;
}
function drawGlowRaw(x,y,r,rgb,a=1){
  ctx.save();ctx.globalAlpha=a;ctx.globalCompositeOperation='lighter';
  ctx.drawImage(glowImg(rgb),x-r,y-r,r*2,r*2);ctx.restore();
}

/* ---------------- câmera / efeitos ---------------- */
const cam={x:0,y:0,shake:0,lead:0};
function shake(n){cam.shake=Math.max(cam.shake,n);}
function camFollow(dt,minX,maxX,frac=.42){
  cam.lead=lerp(cam.lead,player.dir*76,Math.min(1,dt*2.2));
  cam.x=clamp(player.x-W*frac+cam.lead,minX,maxX);
}
let zoomV=1,zoomTgt=1;
function kick(z){zoomTgt=Math.max(zoomTgt,z);}
function camBegin(){ctx.save();const s=cam.shake;ctx.translate(-cam.x+(s?rnd(-s,s):0),-cam.y+(s?rnd(-s,s):0));}
function camEnd(){ctx.restore();}

function skyRect(g,w,h,stops){const gr=g.createLinearGradient(0,0,0,h);for(const s of stops)gr.addColorStop(s[0],s[1]);g.fillStyle=gr;g.fillRect(0,0,w,h);}
function blob(g,x,y,r,col){g.fillStyle=col;g.beginPath();g.arc(x,y,r,0,TAU);g.fill();}
function tree(g,x,gy,s,pal,R){
  const th=s*46,lean=(R()-.5)*s*8;
  g.strokeStyle=pal.trunk;g.lineCap='round';
  g.lineWidth=s*7;g.beginPath();g.moveTo(x,gy);g.quadraticCurveTo(x+lean*.5,gy-th*.55,x+lean,gy-th);g.stroke();
  g.lineWidth=s*3;
  for(let i=0;i<2;i++){const a=(i?1:-1)*(.5+R()*.4);
    g.beginPath();g.moveTo(x+lean*.6,gy-th*.7);g.quadraticCurveTo(x+lean*.6+a*s*10,gy-th*.85,x+lean+a*s*16,gy-th*.95);g.stroke();}
  const cx=x+lean,cy=gy-th,n=5+(R()*3|0);
  for(let i=0;i<n;i++){const a=R()*TAU,d=R()*s*16;
    blob(g,cx+Math.cos(a)*d*1.35,cy+Math.sin(a)*d*.7,s*(11+R()*9),pal.jMid?pal.jMid[i%pal.jMid.length]:pal.leaf);}
  blob(g,cx-s*7,cy-s*9,s*8,pal.leafHi);blob(g,cx+s*5,cy-s*12,s*6,pal.leafHi);
}
function acaiPalm(g,x,gy,s,pal,R){
  const th=s*62,lean=(R()-.5)*s*22,tx=x+lean,ty=gy-th;
  g.strokeStyle=pal.trunk;g.lineCap='round';g.lineWidth=s*3.4;
  g.beginPath();g.moveTo(x,gy);g.quadraticCurveTo(x+lean*.3,gy-th*.6,tx,ty);g.stroke();
  for(let i=0;i<8;i++){const a=-Math.PI/2+(i-3.5)*.34,L=s*(20+R()*7);
    g.strokeStyle=i%2?pal.jMid[0]:pal.jMid[pal.jMid.length-1];g.lineWidth=s*2.6;
    g.beginPath();g.moveTo(tx,ty);
    g.quadraticCurveTo(tx+Math.cos(a)*L*.6,ty+Math.sin(a)*L*.6,tx+Math.cos(a)*L,ty+Math.sin(a)*L+L*.45);g.stroke();}
  g.fillStyle='#5b2a6e';
  for(let i=0;i<5;i++)blob(g,tx+(R()-.5)*s*7,ty+s*(4+R()*5),s*1.7,'#5b2a6e');
}
function fern(g,x,y,s,col){
  g.strokeStyle=col;g.lineCap='round';
  for(let i=0;i<5;i++){const a=-Math.PI/2+(i-2)*.42;g.lineWidth=s*1.6;
    g.beginPath();g.moveTo(x,y);g.quadraticCurveTo(x+Math.cos(a)*s*9,y+Math.sin(a)*s*9,x+Math.cos(a)*s*15,y+Math.sin(a)*s*15+s*4);g.stroke();}
}
function vine(g,x,y,len,col,R){
  g.strokeStyle=col;g.lineWidth=2.2;const sw=(R()-.5)*30;
  g.beginPath();g.moveTo(x,y);g.quadraticCurveTo(x+sw,y+len*.6,x+sw*.4,y+len);g.stroke();
  g.fillStyle=col;
  for(let i=1;i<5;i++)blob(g,x+sw*(.3+i*.12),y+len*i/5,2.6,col);
}
function makeMountains(seed,col,base,amp,w=1600){
  return makeLayer(w,H,(g)=>{const R=sr(seed);g.fillStyle=col;g.beginPath();g.moveTo(0,H);
    let y=base;for(let x=0;x<=w;x+=40){y=clamp(y+(R()-.5)*amp,base-amp*1.6,base+amp*.6);g.lineTo(x,x===0||x===w?base:y);}
    g.lineTo(w,H);g.closePath();g.fill();});

function makeJungle(seed,pal,opts={}){
  const w=opts.w||1600,dark=opts.dark||0,gy=opts.gy||H*.86,den=opts.den||90;
  return makeLayer(w,H,(g)=>{const R=sr(seed);
    if(opts.fill){g.fillStyle=opts.fill;g.fillRect(0,gy-4,w,H-gy+4);}
    for(let x=-30;x<w+30;x+=den*(0.6+R()*.8)){
      const r=R();
      if(r<.18)acaiPalm(g,x,gy,(opts.s||1)*(.8+R()*.5),pal,R);
      else if(r<.82)tree(g,x,gy,(opts.s||1)*(.7+R()*.7),pal,R);
      else fern(g,x,gy,(opts.s||1)*(1.5+R()),pal.jMid[0]);
      if(R()<.3)vine(g,x+R()*60-30,gy-H*.5*R()-60,40+R()*70,pal.trunkD,R);

    g.fillStyle=PAL.cave.rockD;
    for(let i=0;i<9;i++){const x=R()*w,cw=40+R()*70;

function resetPlayer(x,y,hp=3){player.x=x;player.y=y;player.vx=player.vy=0;player.dir=1;

function updatePlat(dt,wld){
  const p=player;p.wld=wld;
  p.inv=Math.max(0,p.inv-dt);p.atkT=Math.max(0,p.atkT-dt);p.atkCd=Math.max(0,p.atkCd-dt);
  p.dashCd=Math.max(0,p.dashCd-dt);p.shotCd=Math.max(0,p.shotCd-dt);p.sq=Math.max(0,p.sq-dt*3);
  p.stun=Math.max(0,p.stun-dt);
  const ctl=p.stun<=0&&(wld.ctl!==false);
  p.shieldOn=ctl&&p.skills.shield&&IN.shield()&&p.onG;
  // dash
  if(ctl&&p.skills.dash&&IN.dashP()&&p.dashCd<=0&&!p.shieldOn){
    p.dashT=.18;p.dashCd=.65;p.vy=0;p.vx=p.dir*600;sfx('dash');
    for(let i=0;i<8;i++)puff({x:p.x,y:p.y-20,vx:-p.dir*rnd(40,160),vy:rnd(-40,40),r:rnd(3,7),life:.4,col:'#b98cf2',add:true,shape:4});
  }
  if(p.dashT>0){p.dashT-=dt;p.vx=p.dir*600;p.vy=0;}
  else if(ctl&&!p.shieldOn){
    const acc=p.onG?2100:1300,max=wld.maxspd||264;
    if(IN.left()){p.vx=Math.max(p.vx-acc*dt,-max);p.dir=-1;}
    else if(IN.right()){p.vx=Math.min(p.vx+acc*dt,max);p.dir=1;}
    else p.vx*=p.onG?Math.pow(.0002,dt):Math.pow(.05,dt);
  } else if(p.shieldOn) p.vx*=Math.pow(.0001,dt);
  // pulo (coyote + buffer)
  p.coyote=p.onG?.12:Math.max(0,p.coyote-dt);
  p.jbuf=(ctl&&IN.jumpP())?.12:Math.max(0,p.jbuf-dt);
  if(p.jbuf>0&&p.coyote>0&&p.dashT<=0){p.vy=-620;p.coyote=0;p.jbuf=0;p.onG=false;sfx('jump');
    for(let i=0;i<6;i++)puff({x:p.x+rnd(-8,8),y:p.y,vx:rnd(-50,50),vy:rnd(10,60),r:rnd(2,5),life:.35,col:'rgba(200,190,160,.8)'});}
  if(p.dashT<=0){p.vy+=(p.vy>0||!IN.jump()?2350:1400)*dt;p.vy=Math.min(p.vy,980);}

  if(wld.plats)for(const pl of wld.plats){
    if(p.vy>=0&&prevY<=pl.y+2&&p.y>=pl.y&&p.x>pl.x-13&&p.x<pl.x+pl.w+13){p.y=pl.y;p.vy=0;p.onG=true;}
  }
  if(p.onG&&wasAir){p.sq=1;sfx('land');
    for(let i=0;i<5;i++)puff({x:p.x+rnd(-10,10),y:p.y,vx:rnd(-70,70),vy:rnd(-30,0),r:rnd(2,5),life:.3,col:'rgba(190,180,150,.7)'});}
  // deslizar (fase da fuga)
  if(wld.slide&&ctl){if(IN.down()&&p.onG)p.slideT=.1;else p.slideT=Math.max(0,p.slideT-dt);}else p.slideT=0;
  p.anim+=dt*(p.onG?Math.abs(p.vx)*.045+2:4);

    puff({x:p.x,y:p.y-22,r:14,life:.25,col:'#8f5fd6',add:true,shape:4,al:.5});}}
  if(p.onG&&Math.abs(p.vx)>90){p._st-=dt;if(p._st<=0){p._st=.26;sfx('step');}}
}

function dShadow(x,y,w){ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(x,y+2,w,w*.26,0,0,TAU);ctx.fill();}
function drawCompy(x,y,t,dir,mood='idle'){
  dShadow(x,y,16);
  ctx.save();ctx.translate(x,y);ctx.scale(dir,1);
  if(mood==='ko'){ctx.translate(2,-5);ctx.rotate(1.35);}
  const run=mood==='chase'||mood==='flee'||mood==='patrol';
  const ph=t*(mood==='chase'?26:18);
  const bob=run?Math.abs(Math.sin(ph))*3:Math.sin(t*3)*1;
  // perninhas
  ctx.strokeStyle='#5d8a34';ctx.lineWidth=3.4;ctx.lineCap='round';
  for(const s of[1,-1]){const a=run?Math.sin(ph+(s>0?0:Math.PI))*.9:.1*s;
    ctx.beginPath();ctx.moveTo(-2,-12);ctx.lineTo(-2+Math.sin(a)*9,-12+Math.cos(a)*11);ctx.stroke();}
  ctx.translate(0,-bob);
  // cauda + corpo + cabeça
  ctx.fillStyle='#7fb04a';
  ctx.beginPath();ctx.moveTo(-8,-16);ctx.quadraticCurveTo(-24,-14+Math.sin(t*7)*3,-30,-20+Math.sin(t*7)*4);
  ctx.quadraticCurveTo(-22,-10,-8,-10);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.ellipse(0,-15,11,8,-.2,0,TAU);ctx.fill();
  ctx.fillStyle='#a8cc74';ctx.beginPath();ctx.ellipse(1,-12,7,4.4,-.2,0,TAU);ctx.fill();
  ctx.fillStyle='#7fb04a';
  ctx.beginPath();ctx.moveTo(7,-18);ctx.quadraticCurveTo(11,-26,15,-27);ctx.stroke();
  ctx.lineWidth=5;ctx.strokeStyle='#7fb04a';ctx.beginPath();ctx.moveTo(7,-19);ctx.quadraticCurveTo(11,-25,14,-26);ctx.stroke();
  ctx.beginPath();ctx.arc(17,-27,6,0,TAU);ctx.fill();
  // bico/focinho
  ctx.beginPath();ctx.moveTo(21,-30);ctx.lineTo(29,-26);ctx.lineTo(21,-23);ctx.closePath();ctx.fill();
  if(mood==='chase'){ctx.strokeStyle='#3d5a20';ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(22,-26.5);ctx.lineTo(27,-26);ctx.stroke();}
  // olho grande (fofice estratégica)
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(17,-28,3.4,0,TAU);ctx.fill();
  if(mood==='ko'){ctx.strokeStyle='#1d2410';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(15,-30);ctx.lineTo(19,-26);ctx.moveTo(19,-30);ctx.lineTo(15,-26);ctx.stroke();}
  else{ctx.fillStyle='#1d2410';ctx.beginPath();ctx.arc(mood==='flee'?16:18,-28,1.8,0,TAU);ctx.fill();}
  // listras
  ctx.strokeStyle='#5d8a34';ctx.lineWidth=1.6;
  for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(-2+i*4,-15,7-i,-1.2,-.2);ctx.stroke();}
  if(mood==='sleep'){txt('z',24,-38+Math.sin(t*2)*3,{s:12,c:'#fff',al:.8});txt('z',30,-46+Math.sin(t*2+1)*3,{s:9,c:'#fff',al:.6});}
  ctx.restore();
}
function drawRaptor(x,y,t,dir,pose={}){
  const cr=pose.crouch||0,lg=pose.lunge||0,hurtK=pose.hurt||0;
  dShadow(x,y,34);
  ctx.save();ctx.translate(x,y);ctx.scale(dir,1);
  if(hurtK>0)ctx.translate(rnd(-2,2),rnd(-2,2));
  const ph=t*16,run=pose.run;
  const bodyY=-38+cr*10+(run?Math.abs(Math.sin(ph))*2:Math.sin(t*2.4)*1.4);
  // pernas com coxas fortes
  for(const s of[1,-1]){
    const a=run?Math.sin(ph+(s>0?0:Math.PI))*.8:(.12*s+cr*.4);
    ctx.strokeStyle=s>0?'#54636f':'#46525c';ctx.lineWidth=8;ctx.lineCap='round';
    const k1=[Math.sin(a)*14,bodyY+14+Math.cos(a)*14];
    ctx.beginPath();ctx.moveTo(0,bodyY+12);ctx.lineTo(k1[0],k1[1]);ctx.stroke();
    ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(k1[0],k1[1]);ctx.lineTo(k1[0]+(run?Math.sin(a+.9)*12:4),Math.min(-2,k1[1]+12));ctx.stroke();
    // garra foice
    ctx.strokeStyle='#e8e4d8';ctx.lineWidth=2.4;
    ctx.beginPath();ctx.arc(k1[0]+6,Math.min(-2,k1[1]+12),4,Math.PI*.2,Math.PI*.9);ctx.stroke();
  }
  // cauda
  ctx.strokeStyle='#5a6b7d';ctx.lineCap='round';
  ctx.lineWidth=9;ctx.beginPath();ctx.moveTo(-6,bodyY);
  ctx.quadraticCurveTo(-30,bodyY-2+Math.sin(t*5)*4,-52,bodyY-8+Math.sin(t*5)*6);ctx.stroke();
  ctx.strokeStyle='#e08a3a';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(-40,bodyY-6+Math.sin(t*5)*5.4);ctx.lineTo(-56,bodyY-12+Math.sin(t*5)*6);ctx.stroke();
  // corpo
  ctx.fillStyle='#5a6b7d';ctx.beginPath();ctx.ellipse(0,bodyY,20,11,-.15-cr*.2+lg*.15,0,TAU);ctx.fill();
  ctx.fillStyle='#8a9aab';ctx.beginPath();ctx.ellipse(2,bodyY+5,13,5,-.15,0,TAU);ctx.fill();
  // bracinhos com garras
  ctx.strokeStyle='#54636f';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(10,bodyY+2);ctx.lineTo(16+lg*6,bodyY+9-lg*4);ctx.stroke();
  // pescoço + cabeça
  const hx=16+lg*8,hy=bodyY-14+cr*8-lg*4;
  ctx.strokeStyle='#5a6b7d';ctx.lineWidth=8;
  ctx.beginPath();ctx.moveTo(10,bodyY-4);ctx.quadraticCurveTo(14,hy+8,hx,hy);ctx.stroke();
  ctx.fillStyle='#5a6b7d';
  ctx.beginPath();ctx.ellipse(hx+6,hy,12,6.4,-.1,0,TAU);ctx.fill();
  // mandíbula
  const mo=pose.mouth!==undefined?pose.mouth:(lg>0?.7:.12+.08*Math.sin(t*3));
  ctx.beginPath();ctx.moveTo(hx+2,hy+3);ctx.lineTo(hx+18,hy+3+mo*8);ctx.lineTo(hx+4,hy+6);ctx.closePath();ctx.fill();
  // dentes
  ctx.fillStyle='#efe9da';
  for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(hx+6+i*3,hy+3.6);ctx.lineTo(hx+7.2+i*3,hy+6.4);ctx.lineTo(hx+8.4+i*3,hy+3.6);ctx.closePath();ctx.fill();}
  // penas da cabeça (moicano laranja)
  ctx.fillStyle='#e08a3a';
  for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(hx-2+i*3,hy-5);ctx.lineTo(hx+i*3,hy-13-i*1+Math.sin(t*6+i)*1.4);ctx.lineTo(hx+2.4+i*3,hy-5);ctx.closePath();ctx.fill();}
  // olho
  const tele=pose.crouch>0.3;
  if(tele)drawGlowRaw(hx+8,hy-2,10,'255,120,80',.8);
  ctx.fillStyle=tele?'#ff5040':'#ffd94d';ctx.beginPath();ctx.arc(hx+8,hy-2,2.6,0,TAU);ctx.fill();
  ctx.fillStyle='#1a1208';ctx.beginPath();ctx.arc(hx+9,hy-2,1.2,0,TAU);ctx.fill();
  ctx.restore();
}
function drawRex(x,y,t,dir,o={}){
  const s=o.s||1,col=o.col||'#4d5d38',colD=o.colD||'#3c4a2c',belly=o.belly||'#8fa068';
  const mouth=o.mouth||0,rage=o.rage,step=o.step||0;
  const ph=t*step;
  dShadow(x,y,74*s);
  ctx.save();ctx.translate(x,y);ctx.scale(dir*s,s);
  const bob=step>0?Math.abs(Math.sin(ph))*5:Math.sin(t*1.6)*2.2;
  const hipY=-64-bob;
  // perna de trás
  rexLeg(-6,hipY,step?Math.sin(ph+Math.PI)*.55:.08,colD,step,ph+Math.PI);
  // cauda
  ctx.strokeStyle=col;ctx.lineCap='round';
  ctx.lineWidth=26;ctx.beginPath();ctx.moveTo(-18,hipY+2);
  ctx.quadraticCurveTo(-58,hipY+6+Math.sin(t*2.2)*6,-92,hipY-6+Math.sin(t*2.2)*10);ctx.stroke();
  ctx.lineWidth=12;ctx.beginPath();ctx.moveTo(-86,hipY-4+Math.sin(t*2.2)*9);
  ctx.quadraticCurveTo(-112,hipY-14+Math.sin(t*2.6)*12,-128,hipY-10+Math.sin(t*2.6)*14);ctx.stroke();
  // corpo
  ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(0,hipY-6,40,26,-.28,0,TAU);ctx.fill();
  ctx.fillStyle=belly;ctx.beginPath();ctx.ellipse(6,hipY+4,26,13,-.28,0,TAU);ctx.fill();
  // espinhos (boss)
  if(o.spikes){ctx.fillStyle=o.spikeCol||'#2c2140';
    for(let i=0;i<5;i++){const bx=-26+i*13,by=hipY-24+i*-3+i*i*.8;
      ctx.beginPath();ctx.moveTo(bx-5,by+6);ctx.lineTo(bx,by-8-i);ctx.lineTo(bx+5,by+6);ctx.closePath();ctx.fill();}}
  // pescoço
  ctx.strokeStyle=col;ctx.lineWidth=30;
  ctx.beginPath();ctx.moveTo(24,hipY-16);ctx.quadraticCurveTo(38,hipY-40,48,hipY-52);ctx.stroke();
  // cabeça
  const hx=52,hy=hipY-60+(o.headBob||0);
  ctx.save();ctx.translate(hx,hy);ctx.rotate(o.headAng||0);
  ctx.fillStyle=col;
  rr(-14,-16,54,26,10);ctx.fill();
  ctx.fillStyle=colD;rr(16,-16,24,12,6);ctx.fill();
  // mandíbula
  ctx.save();ctx.translate(-4,8);ctx.rotate(mouth*.55);
  ctx.fillStyle=colD;rr(-6,-2,44,14,7);ctx.fill();
  ctx.fillStyle='#efe9da';
  for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(4+i*7,-1);ctx.lineTo(6.4+i*7,-7);ctx.lineTo(9+i*7,-1);ctx.closePath();ctx.fill();}
  if(mouth>.25){ctx.fillStyle='#7a1f2e';rr(0,0,36,8,4);ctx.fill();}
  ctx.restore();
  // dentes superiores
  ctx.fillStyle='#efe9da';
  for(let i=0;i<6;i++){ctx.beginPath();ctx.moveTo(4+i*6,9.6);ctx.lineTo(6.4+i*6,15.5);ctx.lineTo(9+i*6,9.6);ctx.closePath();ctx.fill();}
  // narina e olho
  ctx.fillStyle='#242e18';ctx.beginPath();ctx.arc(34,-9,2,0,TAU);ctx.fill();
  if(rage)drawGlowRaw(4,-8,17,'255,60,90',.95);
  else if(o.eyeGlow)drawGlowRaw(4,-8,13,o.eyeGlow,.8);
  ctx.fillStyle=rage?'#ff2d55':'#ffd94d';ctx.beginPath();ctx.arc(4,-8,3.6,0,TAU);ctx.fill();
  ctx.fillStyle='#12160a';ctx.beginPath();ctx.arc(5,-8,1.6,0,TAU);ctx.fill();
  ctx.strokeStyle=colD;ctx.lineWidth=2.4;ctx.beginPath();ctx.moveTo(-2,-14);ctx.lineTo(9,-11);ctx.stroke();
  // coroa do Rex Rei
  if(o.crown){ctx.save();ctx.translate(2,-18);ctx.rotate(-.12);
    ctx.fillStyle='#e8b83c';
    ctx.beginPath();ctx.moveTo(-11,0);ctx.lineTo(-11,-7);ctx.lineTo(-6,-2);ctx.lineTo(-1,-9);ctx.lineTo(4,-2);ctx.lineTo(9,-7);ctx.lineTo(9,0);ctx.closePath();ctx.fill();
    ctx.fillStyle='#c94f6d';ctx.beginPath();ctx.arc(-1,-2.6,1.6,0,TAU);ctx.fill();
    ctx.restore();}
  ctx.restore();
  // bracinhos ridículos
  ctx.strokeStyle=colD;ctx.lineWidth=7;
  ctx.beginPath();ctx.moveTo(26,hipY-8);ctx.lineTo(34,hipY+2+Math.sin(t*3)*1.5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(30,hipY-10);ctx.lineTo(39,hipY-2+Math.sin(t*3+1)*1.5);ctx.stroke();
  // perna da frente
  rexLeg(10,hipY,step?Math.sin(ph)*.55:-.06,col,step,ph);
  ctx.restore();
}
function rexLeg(x,hipY,a,col,step,ph){
  ctx.strokeStyle=col;ctx.lineCap='round';
  const kx=x+Math.sin(a)*26,ky=hipY+Math.cos(a)*26;
  ctx.lineWidth=20;ctx.beginPath();ctx.moveTo(x,hipY+6);ctx.lineTo(kx,ky+4);ctx.stroke();
  const lift=step?Math.max(0,Math.sin(ph))*10:0;
  const fx=kx+Math.sin(-a*.7)*20,fy=Math.min(-6,ky+26)-lift;
  ctx.lineWidth=12;ctx.beginPath();ctx.moveTo(kx,ky+4);ctx.lineTo(fx,fy);ctx.stroke();
  ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(fx+12,fy+2);ctx.stroke();
  ctx.fillStyle='#e8e4d8';
  for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(fx+8+i*5,fy+5);ctx.lineTo(fx+11+i*5,fy+9);ctx.lineTo(fx+13+i*5,fy+4);ctx.closePath();ctx.fill();}
}

/* ============================================================

SC.cave={
  enter(){

      {x:1310,y:GY-4,s:2.3,c:PAL.cave.crys},{x:610,y:GY-3,s:1.2,c:PAL.cave.crys},{x:940,y:GY-2,s:1.4,c:PAL.cave.crys2}];

      showBanner('FASE 3','A CAVERNA DO ENCRENQUEIRO');
      hint('explore... com cuidado',5);

    this.spawnRap=()=>{s.rap={x:1380,y:GY,hp:10,max:10,st:'enter',t:0,dir:-1,face:-1,tgt:0,decT:1,inv:0,cr:0,lg:0};};
    if(GAME.caveIntro){s.phase='fight';this.spawnRap();}
  },
  update(dt){
    const s=this.s;s.t+=dt;const p=player;
    updatePlat(dt,s.wld);
    camFollow(dt,0,1420-W,.45);

    s.drip-=dt;if(s.drip<=0){s.drip=rnd(.3,.9);
      const dx=cam.x+rnd(0,W);
      puff({x:dx,y:rnd(10,60),vx:0,vy:rnd(180,260),r:2.2,life:1.4,col:'rgba(140,200,255,.7)',g:200,shape:0});}
    if(s.phase==='walk'){
      if(p.x>240){s.phase='stick';player.stun=99;
        itemGet('PAU','É um pau. Não é mágico, não é lendário, não tem +2 de dano. É literalmente um pau. Mas é o SEU pau.',
          (x,y)=>{ctx.save();ctx.translate(x,y);ctx.rotate(.7);ctx.strokeStyle='#7a5b36';ctx.lineWidth=13;ctx.lineCap='round';
            ctx.beginPath();ctx.moveTo(0,44);ctx.lineTo(0,-44);ctx.stroke();
            ctx.strokeStyle='#5d4426';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(4,20);ctx.lineTo(12,-20);ctx.stroke();ctx.restore();},
          ()=>{player.hasStick=true;player.stun=0;s.phase='prefight';
            say([{n:'ZÉ',c:'#ffd166',t:'Um pau! Agora sim. Cadê o perigo? Tô pronto pra qualquer coi—'}],
              ()=>{s.phase='fight';this.spawnRap();sfx('squawk');
                say([{n:'RAPTOR',c:'#7fd0e8',t:'*entra pela fresta da caverna, cheirando o ar* ...KRRIIII!'},
                     {n:'ZÉ',c:'#ffd166',t:'Eu e minha boca.'}],
                  ()=>{hint('X  bater   ·   pule por cima do bote   ·   contra-ataque dá dano em dobro!',7);});});});}
    }
    if(s.phase==='fight'&&s.rap){
      const r=s.rap;r.t+=dt;r.inv=Math.max(0,r.inv-dt);
      const dx=p.x-r.x,adx=Math.abs(dx);
      if(r.st==='enter'){r.x-=170*dt;if(r.x<1020)r.st='circle';}
      else if(r.st==='circle'){
        r.face=dx>0?1:-1;r.cr=Math.max(0,r.cr-dt*3);
        const want=p.x-r.face*230;
        r.x+=clamp(want-r.x,-135*DIFF.spd*dt,135*DIFF.spd*dt);
        r.decT-=dt;
        if(r.decT<=0){r.decT=rnd(1,1.9);
          if(adx<420&&Math.random()<.62){r.st='tele';r.t=0;sfx('grr');}}
      }
      else if(r.st==='tele'){r.face=dx>0?1:-1;r.cr=Math.min(1,r.cr+dt*3.4);
        if(r.t>.5/DIFF.spd){r.st='lunge';r.t=0;r.lgDir=r.face;sfx('swing');sfx('squawk');}}
      else if(r.st==='lunge'){
        r.x+=r.lgDir*660*DIFF.spd*dt;r.lg=1;r.cr=0;
        if(r.t>.42){r.st='recover';r.t=0;r.lg=0;}
        const rr2={x:r.x-26,y:GY-56,w:52,h:56};
        if(ovl(pRect(),rr2)&&p.inv<=0){
          if(pDamage(1,r.x)){this.die();return;}}
      }
      else if(r.st==='recover'){r.face=dx>0?1:-1;if(r.t>.75)r.st='circle';}
      if(r.st!=='flee')r.x=clamp(r.x,60,1360);
      // ataque do Zé
      if(IN.atkP()&&p.atkCd<=0&&p.stun<=0){p.atkT=.32;p.atkCd=.42;p.swingHit=false;sfx('swing');}
      if(p.atkT>.1&&p.atkT<.24&&!p.swingHit&&r.st!=='flee'&&r.inv<=0){
        const hb={x:p.x+(p.dir>0?4:-48),y:p.y-54,w:44,h:56};
        if(ovl(hb,{x:r.x-24,y:GY-52,w:48,h:52})){

          if(r.hp<=0){r.st='flee';r.hp=0;s.phase='win';timeScale=.3;setTimeout(()=>timeScale=1,500);
            sfx('cry');musicSet('none');
            for(let i=0;i<6;i++)puff({x:r.x+10,y:GY-60,vx:rnd(-40,40),vy:rnd(-120,-40),r:3,life:1,col:'#9fd8ff',g:150});
            say([{n:'RAPTOR',c:'#7fd0e8',t:'kri... kriii... *sai mancando e chorando*'}]);}
        }
      }
    }
    if((s.phase==='win'||s.phase==='win2')&&s.rap){
      if(s.rap.st==='flee'&&s.rap.x<1600){s.rap.x+=dt*230;s.rap.face=1;s.rap.lg=0;s.rap.cr=0;}
      if(s.phase==='win'&&s.rap.x>=1560&&!dlg){s.phase='win2';
        say([{n:'ZÉ',c:'#ffd166',t:'Foi mal, amigão! Mas convenhamos: você começou.'},
             {n:'ZÉ',c:'#ffd166',t:'Ué... uma luz verde ali no fundo. Luz verde misteriosa em caverna. O que poderia dar errado?'}],
          ()=>{hint('siga a luz →',6);});}
      s.exitGlow=Math.min(1,s.exitGlow+dt*.5);
      if(s.phase==='win2'&&p.x>1340){GAME.caveIntro=1;goScene('wizard');}
    }
  },
  die(){
    stats.deaths++;GAME.caveIntro=1;
    say([{n:'ZÉ',c:'#ffd166',t:'*tudo escuro* ...acordei. Chapéu ainda na cabeça. Orgulho ainda no chão. VAMOS DE NOVO.'}],

  },
  draw(){
    const s=this.s,p=player;
    drawLayer(s.bg,cam.x*.3,0);
    camBegin();
    // estalactites e cristais
    ctx.fillStyle=PAL.cave.rock;

        for(const tg of s.targets){

      }

        const tv=1.05,sx=120,sy=GY-46;

        sfx('swing');}
      for(let i=s.seeds.length-1;i>=0;i--){const sd=s.seeds[i];

          s.refl++;sfx('reflect');flash(.08);this.pop(sd.x,sd.y-14,'REFLETIU! '+s.refl+'/4','#b478e8');

      }

      updShots(dt,null);
      for(const rg of s.rings){
        if(!rg.done&&player.dashT>0&&Math.abs(player.x-rg.x)<30&&Math.abs((player.y-24)-rg.y)<38){
          rg.done=true;sfx('magic');this.pop(rg.x,rg.y-30,'✦','#7de8c8');

          {n:'PAJÉ JURUÁ',c:'#7de8c8',t:'Agora vai. Mas leva uma última dica, essa de graça: o rugido do Rex Rei é pura energia. E energia...'},
          {n:'PAJÉ JURUÁ',c:'#7de8c8',t:'...pode ser REFLETIDA. *pisca*'},
          {n:'ZÉ',c:'#ffd166',t:'O senhor piscou os dois olhos ao mesmo tempo.'},
          {n:'PAJÉ JURUÁ',c:'#7de8c8',t:'É a idade. VAI, ZÉ DO AÇAÍ! O VALE DO JURUÁ TE ESPERA!'}
        ],()=>goScene('boss'));
      }

  },
  draw(){

      ctx.fillStyle='rgba(255,255,255,.35)';ctx.beginPath();ctx.arc(tx-3,tg.y-4,3.4,0,TAU);ctx.fill();
    }
    // anéis
    if(s.stage>=2)for(const rg of s.rings){
      const a=rg.done?.25:.6+.3*Math.sin(T*4+rg.x);
      drawGlowRaw(rg.x,rg.y,40,rg.done?'110,240,190':'170,90,240',a*.5);
      ctx.save();ctx.strokeStyle=rg.done?'rgba(110,240,190,.7)':'rgba(190,120,255,'+a+')';
      ctx.lineWidth=5;ctx.beginPath();ctx.ellipse(rg.x,rg.y,14,34,0,0,TAU);ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,'+a*.5+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.ellipse(rg.x,rg.y,9,28,0,0,TAU);ctx.stroke();ctx.restore();
    }
    // sementes
    for(const sd of s.seeds){
      if(sd.refl)drawGlowRaw(sd.x,sd.y,14,'170,90,240',.8);
      ctx.fillStyle=sd.refl?'#b478e8':'#8a5f3f';
      ctx.beginPath();ctx.ellipse(sd.x,sd.y,7,5.4,sd.vx*.001,0,TAU);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.4)';ctx.beginPath();ctx.arc(sd.x-2,sd.y-1.6,1.8,0,TAU);ctx.fill();
    }
    drawShots();
    drawP(false);
    drawPlayer();
    drawP(true);
    // textos flutuantes
    for(const pp of s.pops)txt(pp.t,pp.x,pp.y-pp.tt*36,{s:15,w:'900',c:pp.c,st:'rgba(0,0,0,.6)',stw:4,al:1-pp.tt});
    camEnd();
    // HUD objetivo
    let obj='';
    if(s.stage===0)obj='cabaças: '+s.targets.filter(t=>t.broke).length+' / 6';
    else if(s.stage===1)obj='refletidas: '+s.refl+' / 4';
    else if(s.stage===2)obj='anéis: '+s.rings.filter(r=>r.done).length+' / 5';
    if(obj){ctx.fillStyle='rgba(8,10,18,.66)';rr(16,14,190,34,17);ctx.fill();
      txt(obj,111,31,{s:16,w:'800',c:'#c8f5e4'});}
    ctx.drawImage(vignImg(),0,0);
  }
};

  ctx.restore();
}

          {n:'REX REI',c:'#ff5f6d',t:'O ACRE SERÁ ESQUECIDO! É o único jeito de proteger os meus dos humanos!'},
          {n:'ZÉ',c:'#ffd166',t:'A gente podia só conversar! Tomar um açaí! Eu pago!'},
          {n:'REX REI',c:'#ff5f6d',t:'DINOSSAURO. NÃO. CONVERSA. RRRAAAAAAAA!'}
        ],()=>{s.phase='fight';b.st='idle';b.t=0;b.wait=.8;musicSet('boss');
          hint('X açaí · Z dash · C escudo — REFLITA O RUGIDO!',8);});}
      if(s.it>2.4)b.x=lerp(b.x,1100,dt*2);
      updatePlat(dt,Object.assign({},s.wld,{ctl:false}));
      camFollow(dt,0,s.wld.maxX-W+60);
      return;
    }
    if(s.phase==='dying'||s.phase==='done'){
      b.t+=dt;b.deadK=Math.min(1,b.deadK+dt*.9);b.mouth=lerp(b.mouth,.7,dt*2);b.yOff=lerp(b.yOff,26,dt*1.5);
      if(s.crown&&!s.crown.rest){const c=s.crown;
        c.vy+=980*dt;c.x+=c.vx*dt;c.y+=c.vy*dt;c.rot+=c.vr*dt;
        if(c.y>GY-8){c.y=GY-8;c.vy*=-.45;c.vx*=.6;c.vr*=.6;if(Math.abs(c.vy)<60){c.rest=true;sfx('crack');}else sfx('rock');}}
      if(b.deadK>.7&&s.phase==='dying'){s.phase='done';
        for(let i=0;i<30;i++)puff({x:b.x+rnd(-90,90),y:GY-rnd(0,140),vx:rnd(-100,100),vy:rnd(-260,-40),r:rnd(3,7),life:1.2,col:i%2?'#c77ce0':'#ffd166',add:true,shape:4,g:60});
        say([
          {n:'REX REI',c:'#ff5f6d',t:'*no chão* ...eu só queria proteger os meus. Se os humanos descobrirem a gente... primeiro vira documentário. Depois vira PARQUE TEMÁTICO.'},
          {n:'ZÉ',c:'#ffd166',t:'Rei... escuta. Ninguém acredita em NADA que acreano fala. Se eu contar que tem dinossauro no Acre, vão dizer que é meme.'},
          {n:'REX REI',c:'#ff5f6d',t:'...hm. É justo. Humano esperto.'},
          {n:'ZÉ',c:'#ffd166',t:'Cola lá em casa. Tem ovo mexi— quer dizer... tem AÇAÍ. Muito açaí.'},
          {n:'REX REI',c:'#ff5f6d',t:'*fungada gigante* Eu aceito.'}
        ],()=>goScene('ending'));}
      updatePlat(dt,Object.assign({},s.wld,{ctl:s.phase==='done'}));
      camFollow(dt,0,s.wld.maxX-W+60);
      return;
    }
    // ===== luta =====
    updatePlat(dt,s.wld);
    camFollow(dt,0,s.wld.maxX-W+60);
    if(IN.atkP())fireShot();
    updShots(dt,(sh)=>{
      for(let mi=s.minions.length-1;mi>=0;mi--){const m=s.minions[mi];
        if(Math.abs(sh.x-m.x)<20&&sh.y>GY-40&&sh.y<GY+6){
          s.minions.splice(mi,1);sfx('squawk');
          for(let i=0;i<8;i++)puff({x:m.x,y:GY-20,vx:rnd(-140,140),vy:rnd(-180,-20),r:rnd(2,4),life:.4,col:'#a8cc74',g:380});
          return true;}}
      const br=this.bossRect();
      if(sh.x>br.x-8&&sh.x<br.x+br.w+8&&sh.y>br.y-8&&sh.y<br.y+br.h+8){
        this.hurtBoss(b.st==='stunned'?2:1,sh.x,sh.y);return true;}
      return false;
    });
    const spd=this.phSpd();
    b.t+=dt;b.inv=Math.max(0,b.inv-dt);
    const dx=p.x-b.x;
    if(b.st!=='charge'&&b.st!=='dying')b.face=dx>0?1:-1;
    // invocação de compys (fase 3)
    if(b.hp<=b.max/3&&b.st==='idle'){s.sumT-=dt;
      if(s.sumT<=0&&s.minions.length<2){b.st='summonTel';b.t=0;s.sumT=9;}}
    if(b.st==='idle'){
      b.mouth=lerp(b.mouth,.12,dt*4);b.step=0;
      if(b.t>b.wait){b.t=0;
        const far=Math.abs(dx)>360,r=Math.random();
        if(far){b.st=r<.55?'chargeTel':(r<.85?'roarTel':'stompTel');}
        else{b.st=r<.4?'tailTel':(r<.65?'stompTel':(r<.9?'roarTel':'chargeTel'));}
        sfx('grr');}
    }
    else if(b.st==='tailTel'){
      b.mouth=.2;
      if(b.t>.38/spd){b.st='tail';b.t=0;sfx('swing');sfx('grr');shake(4);}
    }
    else if(b.st==='tail'){
      // RABADA: varre o lado onde o Zé está
      if(b.t<.28){
        const side=p.x<b.x?-1:1;
        if(Math.abs(p.x-b.x)<190&&p.y>GY-130&&p.inv<=0){
          if(pDamage(1,b.x))return this.die();
          p.vx=side*520;p.vy=-330; // knockback exagerado da rabada
        }
        if((T*30|0)%2===0)puff({x:b.x+(p.x<b.x?-1:1)*rnd(60,170),y:GY-rnd(10,90),vx:(p.x<b.x?-1:1)*rnd(100,260),vy:rnd(-60,60),r:rnd(3,6),life:.3,col:'rgba(255,255,255,.5)',shape:2});
      }
      if(b.t>.5){b.st='idle';b.t=0;b.wait=.8/spd;}
    }
    else if(b.st==='summonTel'){
      b.mouth=.8;
      if(b.t>.7){b.st='idle';b.t=0;b.wait=1/spd;sfx('roar');shake(6);
        for(const mx of[Math.max(140,p.x-330),Math.min(1260,p.x+330)]){
          s.minions.push({x:mx,y:GY,dir:1,t:rnd(9),st:'run'});
          for(let i=0;i<8;i++)puff({x:mx,y:GY-10,vx:rnd(-120,120),vy:rnd(-200,-40),r:rnd(2,5),life:.5,col:'#b478e8',add:true,shape:4});}
        hint('COMPYS! pula em cima delas!',2.5);}
    }
    else if(b.st==='chargeTel'){
      b.mouth=.35;
      if(b.t>.7/spd){b.st='charge';b.t=0;b.cdir=b.face;sfx('roar');shake(5);}
    }
    else if(b.st==='charge'){
      b.step=16;b.x+=b.cdir*(640*spd)*dt;b.mouth=.6;
      if((T*20|0)%2===0)puff({x:b.x-b.cdir*80,y:GY,vx:-b.cdir*rnd(60,160),vy:rnd(-120,-20),r:rnd(5,10),life:.5,col:'rgba(140,100,140,.6)'});
      const br=this.bossRect();
      if(ovl(pRect(),br)&&p.inv<=0){if(pDamage(1,b.x))return this.die();}
      if(b.x<170||b.x>1230){b.x=clamp(b.x,170,1230);b.st='stunned';b.t=0;
        sfx('stomp');sfx('rock');shake(15);flash(.2);kick(1.05);
        this.dropRocks(2);
        for(let i=0;i<14;i++)puff({x:b.x+b.cdir*90,y:GY-rnd(20,150),vx:rnd(-200,200),vy:rnd(-200,0),r:rnd(3,7),life:.7,col:'#5d5468',g:400});}
    }
    else if(b.st==='stunned'){
      b.mouth=.55;
      if((T*3|0)%2===0)puff({x:b.x+rnd(-40,40),y:GY-200,vx:0,vy:-40,r:3,life:.6,col:'#ffd166',add:true,shape:4});
      if(b.t>1.9){b.st='idle';b.t=0;b.wait=.6/spd;}
    }
    else if(b.st==='roarTel'){
      b.mouth=lerp(b.mouth,.05,dt*8);
      if(b.t>.5/spd){b.st='roar';b.t=0;b.roarN=b.hp<=b.max/3?4:3;b.roarT=.1;sfx('roar2');shake(8);}
    }
    else if(b.st==='roar'){
      b.mouth=1;shake(1.5);
      b.roarT-=dt;
      if(b.roarT<=0&&b.roarN>0){b.roarN--;b.roarT=.34/spd;/*qtde definida no roarTel*/
        const low=(b.roarN%2===0);
        s.waves.push({x:b.x+b.face*100,vx:(p.x>b.x?1:-1)*380*spd,low,fr:false,t:0});
      }
      if(b.roarN<=0&&b.t>1.6/spd){b.st='idle';b.t=0;b.wait=.9/spd;}
    }
    else if(b.st==='stompTel'){
      b.mouth=.3;
      if(b.t>.5/spd){b.st='stompAir';b.t=0;b.vy=-560;b.vxj=clamp((p.x-b.x)/.9,-500,500);sfx('swing');}
    }
    else if(b.st==='stompAir'){
      b.vy+=1250*dt;b.yOff+=b.vy*dt;b.x+=b.vxj*dt;b.x=clamp(b.x,170,1230);
      if(b.yOff>=0){b.yOff=0;b.st='idle';b.t=0;b.wait=1/spd;
        sfx('stomp');sfx('rock');shake(16);flash(.15);kick(1.05);
        s.waves.push({x:b.x-90,vx:-430*spd,low:true,fr:false,t:0});
        s.waves.push({x:b.x+90,vx:430*spd,low:true,fr:false,t:0});
        this.dropRocks(b.hp<=b.max/3?4:3);
        const br=this.bossRect();
        if(ovl(pRect(),{x:br.x-20,y:br.y,w:br.w+40,h:br.h})&&p.inv<=0){if(pDamage(1,b.x))return this.die();}
        for(let i=0;i<16;i++)puff({x:b.x+rnd(-120,120),y:GY,vx:rnd(-220,220),vy:rnd(-240,-40),r:rnd(3,8),life:.6,col:'rgba(140,100,140,.6)',g:500});}
    }
    // ondas sônicas
    for(let i=s.waves.length-1;i>=0;i--){const w=s.waves[i];w.t+=dt;w.x+=w.vx*dt;
      if(w.x<cam.x-80||w.x>cam.x+W+80){s.waves.splice(i,1);continue;}
      const hb=w.low?{x:w.x-14,y:GY-48,w:28,h:48}:{x:w.x-14,y:GY-158,w:28,h:86};
      if(!w.fr){
        if(p.shieldOn&&ovl(hb,shieldRect())){
          w.fr=true;w.vx=(p.x<b.x?1:-1)*Math.abs(w.vx)*1.5;sfx('reflect');flash(.12);hitPause=.04;
          hint('REFLETIU!',1);continue;}
        if(ovl(hb,pRect())&&p.inv<=0){s.waves.splice(i,1);
          if(pDamage(1,w.x))return this.die();continue;}
      }else{
        const br=this.bossRect();
        if(ovl(hb,br)){s.waves.splice(i,1);
          this.hurtBoss(4,w.x,GY-90);b.st='stunned';b.t=.6;flash(.2);sfx('roar');kick(1.06);
          continue;}
      }
    }
    // compys invocadas
    for(let mi=s.minions.length-1;mi>=0;mi--){const m=s.minions[mi];
      m.t+=dt;const mdx=p.x-m.x;m.dir=mdx>0?1:-1;
      m.x+=m.dir*205*DIFF.spd*dt;m.x=clamp(m.x,120,1280);
      const mr={x:m.x-18,y:GY-34,w:36,h:34};
      if(ovl(pRect(),mr)){
        if(p.vy>120&&p.y<GY-12){ // stomp nas minions também!
          s.minions.splice(mi,1);stats.tamed++;
          p.vy=-400;p.onG=false;sfx('hit');sfx('squawk');kick(1.03);
          for(let i=0;i<10;i++)puff({x:m.x,y:GY-24,vx:rnd(-150,150),vy:rnd(-200,-30),r:rnd(2,4),life:.5,col:i%2?'#ffd166':'#a8cc74',g:400});
          continue;
        }else if(p.inv<=0){if(pDamage(1,m.x))return this.die();}
      }
    }
    // pedras do céu
    for(let i=s.rocks.length-1;i>=0;i--){const r=s.rocks[i];
      if(r.warn>0){r.warn-=dt;continue;}
      r.vy+=1350*dt;r.y+=r.vy*dt;
      if(r.y>=GY-14){sfx('rock');shake(4);
        for(let j=0;j<9;j++)puff({x:r.x,y:GY,vx:rnd(-200,200),vy:rnd(-260,-40),r:rnd(2,6),life:.6,col:'#6a6274',g:500});
        if(Math.abs(p.x-r.x)<38&&p.y>GY-60&&p.inv<=0){if(pDamage(1,r.x))return this.die();}
        s.rocks.splice(i,1);continue;}
      if(Math.abs(p.x-r.x)<24&&p.y-24>r.y-20&&p.y-48<r.y+20&&p.inv<=0){
        if(pDamage(1,r.x))return this.die();s.rocks.splice(i,1);}
    }
  },
  dropRocks(n){
    const s=this.s;
    for(let i=0;i<n;i++)s.rocks.push({x:clamp(player.x+rnd(-160,160),100,1300),y:-60,vy:0,warn:.85+i*.14});
  },
  die(){
    const s=this.s;stats.deaths++;
    const tt=['Já cansou, entregador?','O açaí acabou, foi?','De novo? Admiro a teimosia.','O Acre já tá 80% esquecido. Desiste!'];
    say([{n:'REX REI',c:'#ff5f6d',t:tt[s.taunts++%tt.length]},
         {n:'ZÉ',c:'#ffd166',t:'*levanta e limpa o chapéu* ...foi o chinelo que escorregou.'}],
      ()=>{resetPlayer(220,GY,5+DIFF.hp);player.hasStaff=true;
        const b=s.boss;b.hp=Math.min(b.max,b.hp+Math.round(14*DIFF.bhp));b.st='idle';b.t=0;b.wait=1.2;b.x=1100;b.yOff=0;
        s.waves=[];s.rocks=[];s.minions=[];shots=[];flash(.3);});
  },
  draw(){
    const s=this.s,b=s.boss;
    skyRect(ctx,W,H,[[0,PAL.storm.skyT],[.55,PAL.storm.skyM],[1,PAL.storm.skyB]]);
    // relâmpago no céu
    if(s.lf>0){ctx.fillStyle='rgba(220,225,255,'+(s.lf*.55)+')';ctx.fillRect(0,0,W,H);}
    if(s.bolt){ctx.save();ctx.strokeStyle='rgba(240,245,255,.95)';ctx.lineWidth=3;
      ctx.shadowColor='#aab8ff';ctx.shadowBlur=14;
      ctx.beginPath();s.bolt.seg.forEach((sg,i)=>i?ctx.lineTo(sg[0],sg[1]):ctx.moveTo(sg[0],sg[1]));ctx.stroke();ctx.restore();}
    drawLayer(s.mtn,cam.x*.15,0);
    mist(H*.46,90,PAL.storm.mist,.16);
    drawLayer(s.jf,cam.x*.4,0);
    drawLayer(s.jm,cam.x*.68,0);
    camBegin();
    drawGround(PAL.storm);
    // paredes da arena
    drawRock(-40,GY-300,240,300,'#3d3448','#2a2338');
    drawRock(1240,GY-300,260,300,'#3d3448','#2a2338');
    // telegraph da investida
    if(b.st==='chargeTel'){const a=.4+.4*Math.sin(T*14);
      ctx.strokeStyle='rgba(255,80,90,'+a+')';ctx.lineWidth=4;
      for(let i=0;i<4;i++){const lx=b.x+b.face*(120+i*90);
        ctx.beginPath();ctx.moveTo(lx,GY+8);ctx.lineTo(lx+b.face*40,GY+8);ctx.stroke();}}
    // sombras das pedras
    for(const r of s.rocks){
      const a=r.warn>0?(.3+.3*Math.sin(T*16)):(clamp(1-(GY-r.y)/500,0,1));
      ctx.fillStyle='rgba(0,0,0,'+(a*.5)+')';ctx.beginPath();ctx.ellipse(r.x,GY+4,26,6,0,0,TAU);ctx.fill();
      if(r.warn<=0){ctx.fillStyle='#6a6274';ctx.beginPath();
        ctx.moveTo(r.x-16,r.y+10);ctx.lineTo(r.x-8,r.y-14);ctx.lineTo(r.x+10,r.y-10);ctx.lineTo(r.x+16,r.y+8);ctx.closePath();ctx.fill();
        ctx.fillStyle='#524a5e';ctx.beginPath();ctx.moveTo(r.x-8,r.y-14);ctx.lineTo(r.x+10,r.y-10);ctx.lineTo(r.x+2,r.y+9);ctx.closePath();ctx.fill();}
    }
    // ondas sônicas
    for(const w of s.waves){
      const col=w.fr?'170,90,240':'255,90,110';
      const yb=w.low?GY-24:GY-116;
      drawGlowRaw(w.x,yb,34,col,.5);
      ctx.save();ctx.strokeStyle='rgba('+col+',.9)';ctx.lineWidth=4;
      const dir2=w.vx>0?1:-1;
      for(let i=0;i<3;i++){ctx.globalAlpha=.9-i*.25;
        const a0=dir2>0?-1.1:Math.PI-1.1,a1=dir2>0?1.1:Math.PI+1.1;
        ctx.beginPath();ctx.arc(w.x-dir2*i*10,yb,(w.low?20:38)-i*4,a0,a1);ctx.stroke();}
      ctx.restore();
    }
    // Rex Rei
    ctx.save();
    if(b.st==='dying'||s.phase==='done'){ctx.translate(b.x,GY);ctx.rotate(b.face*.001+ -b.face*.32*b.deadK);ctx.translate(-b.x,-GY);}
    if(b.inv>0){ctx.globalAlpha=.7;}
    drawRex(b.x,GY+b.yOff,T,b.face,{s:3,col:'#3d2a4e',colD:'#2c1e3a',belly:'#6e5a80',
      step:b.step||((b.st==='charge')?16:0),mouth:b.mouth,rage:b.hp<=b.max/3&&s.phase==='fight',
      crown:!(s.crown),spikes:true,spikeCol:'#241738',eyeGlow:'200,80,255',
      headBob:b.st==='roar'?Math.sin(T*30)*3:0,headAng:b.st==='roarTel'?-.25:(b.st==='roar'?.15:0)});
    ctx.restore();
    // rabada: rastro da varredura + aviso
    if(b.st==='tailTel'){const side=player.x<b.x?-1:1,a=.3+.4*Math.sin(T*16);
      ctx.strokeStyle='rgba(255,90,110,'+a+')';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(b.x,GY-40,165,side>0?-.5:Math.PI-.5,side>0?.5:Math.PI+.5);ctx.stroke();}
    if(b.st==='tail'&&b.t<.3){const side=player.x<b.x?-1:1;
      ctx.save();ctx.globalAlpha=.55;ctx.strokeStyle='#fff';
      for(let i=0;i<3;i++){ctx.lineWidth=6-i*1.6;
        ctx.beginPath();ctx.arc(b.x,GY-40,120+i*26,side>0?-.6+b.t*2:Math.PI-.6+b.t*2,side>0?.2+b.t*2:Math.PI+.2+b.t*2);ctx.stroke();}
      ctx.restore();}
    // aviso da invocação
    if(b.st==='summonTel'){drawGlowRaw(b.x+b.face*40,GY-200+b.yOff,70,'200,80,255',.4+.3*Math.sin(T*14));}
    for(const m of s.minions)drawCompy(m.x,GY,m.t,m.dir,'chase');
    // coroa voando
    if(s.crown)drawCrown(s.crown.x,s.crown.y,s.crown.rot,3.2);
    drawShots();
    drawP(false);
    drawPlayer();
    drawP(true);
    camEnd();
    ctx.drawImage(vignImg(),0,0);
    if(s.phase==='fight'){drawHearts(player.hp,player.maxhp);bossBar('REX REI DO ACRE',b.hp,b.max);}
    ctx.fillStyle='rgba(30,10,50,.14)';ctx.fillRect(0,0,W,H);
  }
};

function drawBat(x,y,t){
  const fl=Math.sin(t*14);
  ctx.save();ctx.translate(x,y);
  ctx.fillStyle='#3a3a54';
  ctx.beginPath();ctx.ellipse(0,0,7,9,0,0,TAU);ctx.fill();
  for(const sd of[-1,1]){ctx.beginPath();
    ctx.moveTo(sd*4,-2);
    ctx.quadraticCurveTo(sd*16,-8-fl*7,sd*26,-2-fl*9);
    ctx.quadraticCurveTo(sd*18,4-fl*3,sd*4,3);ctx.closePath();ctx.fill();}
  ctx.beginPath();ctx.moveTo(-4,-7);ctx.lineTo(-6,-13);ctx.lineTo(-1,-9);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(4,-7);ctx.lineTo(6,-13);ctx.lineTo(1,-9);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ffd94d';ctx.beginPath();ctx.arc(-2,-2,1.4,0,TAU);ctx.arc(3,-2,1.4,0,TAU);ctx.fill();
  ctx.restore();
}

    for(const bt2 of s.bats)if(!bt2.dead)drawBat(bt2.x,bt2.y2||bt2.y,T+bt2.ph);
    drawShots();
    drawP(false);drawPlayer();drawP(true);
    camEnd();
    drawLayer(s.clF,cam.x*1.25+T*14,H*.58+cam.y*1.1,.55);

    ctx.drawImage(vignImg(),0,0);
  }
};

function drawDragon(hx,hy,t,dir,o={}){
  const N=9,rage=o.rage,pur=o.pure;
  const bodyA=pur?'#4aa876':(rage?'#8a3a2e':'#2e7d5a'),
        bodyB=pur?'#3e9468':(rage?'#6d2c22':'#276b4c'),
        belly=pur?'#a8e0b8':'#d8b46a',
        spike=pur?'#7ad89a':(rage?'#ffb02e':'#e8742e');
  const segs=[];
  for(let i=0;i<N;i++)segs.push([hx-dir*i*26,hy+Math.sin(t*2.6-i*.75)*13+i*i*.3*(o.droop||0)]);
  // asas
  const wx=segs[2][0],wy=segs[2][1],fl=Math.sin(t*(o.flapSpd||7));
  for(const sd of[-1,1]){
    ctx.fillStyle=pur?'rgba(140,220,170,.72)':(rage?'rgba(160,50,40,.85)':'rgba(120,45,45,.82)');
    ctx.beginPath();ctx.moveTo(wx,wy-6);
    ctx.quadraticCurveTo(wx-dir*20,wy-70-fl*26,wx-dir*(30+sd*8),wy-84-fl*34);
    ctx.quadraticCurveTo(wx-dir*(58+sd*8),wy-60-fl*22,wx-dir*66,wy-20-fl*8);
    ctx.quadraticCurveTo(wx-dir*40,wy-30-fl*10,wx,wy+2);ctx.closePath();ctx.fill();
    ctx.strokeStyle=pur?'#2e7d5a':'#4a1a1a';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(wx,wy-4);ctx.lineTo(wx-dir*(30+sd*8),wy-80-fl*32);ctx.stroke();
  }
  // corpo serpentino
  for(let i=N-1;i>=1;i--){const r=Math.max(4,16-i*1.2);
    ctx.fillStyle=i%2?bodyA:bodyB;
    ctx.beginPath();ctx.arc(segs[i][0],segs[i][1],r,0,TAU);ctx.fill();
    if(i<7){ctx.fillStyle=belly;ctx.beginPath();ctx.ellipse(segs[i][0],segs[i][1]+r*.42,Math.max(3,r*.68),Math.max(2,r*.4),0,0,TAU);ctx.fill();}
    ctx.fillStyle=spike;
    ctx.beginPath();ctx.moveTo(segs[i][0]-4,segs[i][1]-r+2);ctx.lineTo(segs[i][0],segs[i][1]-r-7);ctx.lineTo(segs[i][0]+4,segs[i][1]-r+2);ctx.closePath();ctx.fill();
  }
  // leque da cauda
  const tx2=segs[N-1][0],ty2=segs[N-1][1];
  ctx.fillStyle=spike;
  for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(tx2,ty2);
    ctx.lineTo(tx2-dir*17,ty2+i*10-4);ctx.lineTo(tx2-dir*9,ty2+i*4);ctx.closePath();ctx.fill();}
  // cabeça
  ctx.save();ctx.translate(hx,hy);ctx.scale(dir,1);
  if(rage)drawGlowRaw(0,-2,46,'255,90,60',.45);
  if(pur)drawGlowRaw(0,-2,46,'120,255,180',.4);
  ctx.fillStyle=bodyA;rr(-16,-14,46,27,11);ctx.fill();
  ctx.fillStyle=belly;rr(10,-5,20,12,5);ctx.fill();
  const mo=o.mouth||0;
  ctx.save();ctx.translate(2,9);ctx.rotate(mo*.6);
  ctx.fillStyle=bodyB;rr(-2,-2,31,10,4);ctx.fill();
  ctx.fillStyle='#efe9da';
  for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(7+i*7,-1);ctx.lineTo(9+i*7,-6);ctx.lineTo(11+i*7,-1);ctx.closePath();ctx.fill();}
  ctx.restore();
  ctx.fillStyle='#efe9da';
  for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(8+i*7,7);ctx.lineTo(10+i*7,12);ctx.lineTo(12+i*7,7);ctx.closePath();ctx.fill();}
  if(mo>.35&&!pur)drawGlowRaw(32,8,20,o.blue?'80,160,255':'255,140,40',.85);
  ctx.fillStyle=pur?'#d8f0c0':'#e8d8b0';
  ctx.beginPath();ctx.moveTo(-10,-12);ctx.quadraticCurveTo(-18,-30,-28,-35);ctx.quadraticCurveTo(-15,-22,-13,-10);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-2,-13);ctx.quadraticCurveTo(-8,-34,-17,-41);ctx.quadraticCurveTo(-5,-26,-3,-11);ctx.closePath();ctx.fill();
  ctx.strokeStyle=spike;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(26,3);ctx.quadraticCurveTo(40,7+Math.sin(t*3)*4,48,-1+Math.sin(t*2.4)*6);ctx.stroke();
  ctx.fillStyle=rage?'#ff3d2e':(pur?'#eafff0':'#ffd94d');ctx.beginPath();ctx.arc(0,-4,3.8,0,TAU);ctx.fill();
  ctx.fillStyle='#101408';ctx.beginPath();ctx.arc(1.5,-4,1.7,0,TAU);ctx.fill();
  ctx.restore();
}
SC.dragon={
  enter(){
    const dhp=Math.round(70*DIFF.bhp);
    const s=this.s={t:0,phase:'intro',it:0,fire:[],mets:[],walls:[],m2:0,m3:0,taunts:0,
      dg:{hx:1500,hy:120,dir:-1,st:'fly',t:0,hp:dhp,max:dhp,mouth:.1,inv:0,perch:false,cyc:0,fT:1,deadK:0,pT:0,tgx:660}};
    s.wld={minX:60,maxX:1260,gy:GY,plats:[],maxspd:270};
    s.mtn=makeMountains(701,'#2a3860',H*.52,120);
    s.cl=makeClouds(711);
    s.clSea=makeClouds(721,'240,246,255',.95);
    resetPlayer(200,GY,5+DIFF.hp);
    player.hasStaff=true;player.skills={shot:true,shield:true,dash:true};
    musicSet('none');
    showBanner('FASE FINAL','O DRAGÃO DO MOA');
  },
  spd(){const d=this.s.dg;return (d.hp<=d.max/4?1.3:(d.hp<=d.max/2?1.12:1))*DIFF.spd;},
  hurt(n,hx,hy){
    const s=this.s,d=s.dg;
    if(d.inv>0||s.phase!=='fight')return;
    if(d.perch)n*=2;
    d.hp-=n;d.inv=.12;sfx('hit');hitPause=.03;shake(3);
    for(let i=0;i<8;i++)puff({x:hx,y:hy,vx:rnd(-180,180),vy:rnd(-180,40),r:rnd(2,5),life:.5,col:i%2?'#b478e8':'#ffd166',g:280});
    if(d.hp<=d.max/2&&!s.m2){s.m2=1;hint('METADE! cuidado com o fogo rasteiro',3);}
    if(d.hp<=d.max/4&&!s.m3){s.m3=1;musicSet('boss2');sfx('roar2');shake(9);hint('FOGO AZUL! FÚRIA TOTAL!',3);}
    if(d.hp<=0){d.hp=0;this.winSeq();}
  },
  winSeq(){
    const s=this.s,d=s.dg;
    s.phase='dying';d.st='fall';d.t=0;timeScale=.25;musicSet('none');
    sfx('roar2');flash(.6);shake(16);kick(1.09);
    setTimeout(()=>timeScale=1,900);
  },
  die(){
    const s=this.s;stats.deaths++;
    const tt=['Desce e pensa na vida, maguinho.','O açaí esfriou, foi?','Mil anos de treino contra... isso aí.'];
    say([{n:'DRAGÃO DO MOA',c:'#ff9e5e',t:tt[s.taunts++%tt.length]},
         {n:'ZÉ',c:'#ffd166',t:'*cospe poeira* O chinelo escorregou DE NOVO.'}],
      ()=>{resetPlayer(200,GY,5+DIFF.hp);player.hasStaff=true;
        const d=s.dg;d.hp=Math.min(d.max,d.hp+Math.round(16*DIFF.bhp));
        d.st='fly';d.t=0;d.hx=900;d.hy=150;d.perch=false;
        s.fire=[];s.mets=[];s.walls=[];shots=[];flash(.3);});
  },
  update(dt){
    const s=this.s,d=s.dg,p=player,spd=this.spd();
    s.t+=dt;
    if(s.phase==='intro'){
      s.it+=dt;
      d.hx=lerp(d.hx,760,dt*1.4);d.hy=140+Math.sin(s.t*1.6)*20;d.dir=-1;
      updatePlat(dt,Object.assign({},s.wld,{ctl:false}));
      camFollow(dt,0,s.wld.maxX-W+60);
      if(s.it>1.6&&!s.i1){s.i1=1;sfx('roar2');shake(8);
        say([
          {n:'???',c:'#ff9e5e',t:'*o vento congela* QUEM SOBE MINHA SERRA... SEM AGENDAR?'},
          {n:'ZÉ',c:'#ffd166',t:'Zé do Açaí. Entregador. Mago. Padrinho de seis dinossaurinhos. Vim quebrar o feitiço NA FONTE.'},
          {n:'DRAGÃO DO MOA',c:'#ff9e5e',t:'Mil anos guardando esta fronteira... e me ESQUECERAM. Até o GPS me esqueceu. ATÉ O IBGE.'},
          {n:'ZÉ',c:'#ffd166',t:'Peraí... o Feitiço do Esquecimento... é MÁGOA?!'},
          {n:'DRAGÃO DO MOA',c:'#ff9e5e',t:'É PRINCÍPIO! Se esqueceram de mim, vão esquecer de TUDO! RRRAAAAAA!'}
        ],()=>{s.phase='fight';d.st='fly';d.t=0;musicSet('boss');
          hint('X açaí · C reflete bola de fogo · Z dash no rasante · derrube-o quando pousar!',9);});}
      return;
    }
    if(s.phase==='dying'||s.phase==='done'){
      d.t+=dt;d.deadK=Math.min(1,d.deadK+dt*.8);
      d.hy=Math.min(GY-26,d.hy+320*dt*d.deadK);
      d.mouth=lerp(d.mouth,.55,dt*2);
      if(d.hy>=GY-26&&!s.landed){s.landed=1;shake(10);sfx('stomp');
        for(let i=0;i<20;i++)puff({x:d.hx+rnd(-80,80),y:GY,vx:rnd(-200,200),vy:rnd(-240,-40),r:rnd(3,7),life:.7,col:'rgba(160,180,210,.6)',g:400});}
      if(d.deadK>=1&&s.phase==='dying'){s.phase='done';
        for(let i=0;i<36;i++)puff({x:d.hx+rnd(-100,60),y:d.hy+rnd(-30,30),vx:rnd(-80,80),vy:rnd(-160,-20),r:rnd(3,6),life:1.4,col:i%2?'#7ad89a':'#c8ffe0',add:true,shape:4,g:30});
        sfx('magic');flash(.3);
        say([
          {n:'DRAGÃO DO MOA',c:'#8fe0a0',t:'*a fúria escorre e vira brisa* ...esse gosto. Açaí? Ninguém me trazia açaí desde o Império.'},
          {n:'ZÉ',c:'#ffd166',t:'Pronto, vovô dragão. Tá lembrado. E olha: TODO SÁBADO eu subo aqui com um litro. Juro pelo chapéu.'},
          {n:'DRAGÃO DO MOA',c:'#8fe0a0',t:'Todo... sábado? *olhos de mil anos marejando* Então o feitiço... não tem mais porquê.'},
          {n:'ZÉ',c:'#ffd166',t:'E se alguém duvidar do Acre de novo, o senhor sobrevoa Rio Branco que eu quero ver.'}
        ],()=>goScene('ending'));}
      updatePlat(dt,Object.assign({},s.wld,{ctl:s.phase==='done'}));
      camFollow(dt,0,s.wld.maxX-W+60);
      return;
    }
    // ===== luta =====
    updatePlat(dt,s.wld);
    camFollow(dt,0,s.wld.maxX-W+60);
    if(IN.atkP())fireShot();
    updShots(dt,(sh)=>{
      if(Math.hypot(sh.x-d.hx,sh.y-d.hy)<52){this.hurt(1,sh.x,sh.y);return true;}
      for(let i=1;i<7;i++){const sx=d.hx-d.dir*i*26,sy=d.hy+Math.sin(s.t*2.6-i*.75)*13;
        if(Math.hypot(sh.x-sx,sh.y-sy)<24){this.hurt(1,sh.x,sh.y);return true;}}
      return false;
    });
    d.t+=dt;d.inv=Math.max(0,d.inv-dt);
    if(d.st!=='dive')d.dir=p.x>d.hx?1:-1;
    if(d.st==='fly'){
      d.perch=false;d.mouth=lerp(d.mouth,.12,dt*4);
      d.hx=660+Math.sin(d.t*.85*spd)*400;
      d.hy=168+Math.sin(d.t*1.7*spd)*62;
      d.fT-=dt;
      if(d.fT<=0){d.fT=(d.hp<=d.max/4?.85:1.15)/spd;d.mouth=.7;sfx('shot');
        const tv=.95,fx=d.hx+d.dir*30,fy=d.hy+10;
        s.fire.push({x:fx,y:fy,vx:(p.x-fx)/tv,vy:(GY-24-fy-.5*430*tv*tv)/tv,t:0,refl:false});}
      if(d.t>3.4){d.t=0;d.cyc++;
        const c=d.cyc%4;

        else if(c===3)d.st='rainUp';
        else if(c===0)d.st='perchGo';
      }
    }
    else if(d.st==='diveTel'){
      d.mouth=.4;d.hy=lerp(d.hy,GY-62,dt*5);
      d.hx=lerp(d.hx,p.x<660?1180:140,dt*3);
      if(d.t>.6/spd){d.st='dive';d.t=0;d.dir=p.x>d.hx?1:-1;sfx('roar');shake(5);}
    }
    else if(d.st==='dive'){
      d.mouth=.85;d.hy=GY-62;
      d.hx+=d.dir*880*spd*dt;
      if((T*30|0)%2===0)puff({x:d.hx-d.dir*40,y:d.hy+rnd(-14,20),vx:-d.dir*rnd(80,200),vy:rnd(-40,40),r:rnd(3,6),life:.4,col:s.m3?'rgba(90,160,255,.6)':'rgba(255,140,60,.55)',add:true,shape:4});

    else if(d.st==='rain'){

      puff({x:m.x+rnd(-4,4),y:m.y-14,r:rnd(3,6),life:.3,col:s.m3?'#5aa0ff':'#ff9e40',add:true,shape:4});
      if(m.y>=GY-8){sfx('rock');shake(4);
        for(let j=0;j<9;j++)puff({x:m.x,y:GY,vx:rnd(-180,180),vy:rnd(-240,-30),r:rnd(2,5),life:.5,col:s.m3?'#5aa0ff':'#ff9e40',add:true,shape:4,g:420});
        if(Math.abs(p.x-m.x)<40&&p.y>GY-60&&p.inv<=0){if(pDamage(1,m.x))return this.die();}
        s.mets.splice(i,1);continue;}
      if(Math.abs(p.x-m.x)<20&&p.y-24>m.y-18&&p.y-48<m.y+18&&p.inv<=0){
        if(pDamage(1,m.x))return this.die();s.mets.splice(i,1);}
    }
    // paredes de fogo rasteiras
    for(let i=s.walls.length-1;i>=0;i--){const w=s.walls[i];w.x+=w.vx*dt;
      if((T*20|0)%2===0)puff({x:w.x+rnd(-8,8),y:GY-rnd(0,40),vx:rnd(-20,20),vy:rnd(-120,-40),r:rnd(3,6),life:.35,col:s.m3?'#5aa0ff':'#ff9e40',add:true,shape:4});
      if(w.x<20||w.x>1300){s.walls.splice(i,1);continue;}
      if(ovl({x:w.x-12,y:GY-44,w:24,h:44},pRect())&&p.inv<=0){
        s.walls.splice(i,1);if(pDamage(1,w.x))return this.die();}
    }
  },
  wallBurst(){
    const s=this.s,d=this.s.dg;
    s.walls.push({x:d.hx-60,vx:-300*DIFF.spd});
    s.walls.push({x:d.hx+60,vx:300*DIFF.spd});
    sfx('crack');
  },
  draw(){
    const s=this.s,d=s.dg;
    skyRect(ctx,W,H,[[0,'#101a3e'],[.4,'#3a5a94'],[.72,'#8ab0d8'],[1,'#ffd9a0']]);
    for(let i=0;i<24;i++){const tw=.3+.7*Math.abs(Math.sin(T*.7+i*7));
      ctx.fillStyle='rgba(255,255,255,'+(tw*.6)+')';ctx.fillRect(h1(i*3.1)*W,h1(i*8.7)*H*.3,1.6,1.6);}
    drawSun(W*.5,H*.66,40,'255,220,150');
    drawLayer(s.mtn,cam.x*.15,0);
    // mar de nuvens
    drawLayer(s.clSea,cam.x*.3+T*7,H*.56,.95);
    drawLayer(s.clSea,cam.x*.45+T*12+400,H*.64,.8);
    mist(H*.6,120,'240,246,255',.3);
    camBegin();
    drawGround(PAL.peak);
    drawRock(-60,GY-140,200,140,'#425270','#2c3854');
    drawRock(1200,GY-140,200,140,'#425270','#2c3854');
    // sombras dos meteoros
    for(const m of s.mets){
      const a=m.warn>0?(.3+.3*Math.sin(T*16)):.5;
      ctx.fillStyle='rgba(0,0,0,'+(a*.5)+')';ctx.beginPath();ctx.ellipse(m.x,GY+4,24,6,0,0,TAU);ctx.fill();
      if(m.warn<=0){drawGlowRaw(m.x,m.y,22,s.m3?'80,160,255':'255,140,40',.9);
        ctx.fillStyle=s.m3?'#8ac0ff':'#ffb060';ctx.beginPath();ctx.arc(m.x,m.y,9,0,TAU);ctx.fill();}
    }
    // paredes de fogo
    for(const w of s.walls){
      drawGlowRaw(w.x,GY-24,36,s.m3?'80,160,255':'255,140,40',.8);
      ctx.fillStyle=s.m3?'rgba(120,180,255,.85)':'rgba(255,160,60,.85)';
      for(let i=0;i<3;i++){const fh=44-i*10+Math.sin(T*18+i*2+w.x)*6;
        ctx.beginPath();ctx.moveTo(w.x-10+i*8,GY);
        ctx.quadraticCurveTo(w.x-10+i*8+4,GY-fh*.6,w.x-6+i*8,GY-fh);
        ctx.quadraticCurveTo(w.x-2+i*8,GY-fh*.5,w.x+2+i*8,GY);ctx.closePath();ctx.fill();}
    }
    // dragão
    ctx.save();
    if(s.phase==='dying'||s.phase==='done'){ctx.translate(d.hx,d.hy);ctx.rotate(d.dir*.18*d.deadK);ctx.translate(-d.hx,-d.hy);}
    if(d.inv>0)ctx.globalAlpha=.72;
    drawDragon(d.hx,d.hy,s.t,d.dir,{mouth:d.mouth,rage:s.m3&&s.phase==='fight',pure:s.phase==='done',
      flapSpd:d.perch?3:(d.st==='dive'?11:7),droop:d.perch||s.phase!=='fight'&&s.phase!=='intro'?.5:0,blue:s.m3});
    ctx.restore();
    // bolas de fogo
    for(const f of s.fire){
      drawGlowRaw(f.x,f.y,18,f.refl?'170,90,240':(s.m3?'80,160,255':'255,140,40'),.95);
      ctx.fillStyle=f.refl?'#c77ce0':(s.m3?'#8ac0ff':'#ffb060');
      ctx.beginPath();ctx.arc(f.x,f.y,7,0,TAU);ctx.fill();
    }
    drawShots();
    drawP(false);drawPlayer();drawP(true);
    camEnd();
    drawLayer(s.clSea,cam.x*1.2+T*18,H*.86,.4);
    if(s.phase==='fight'){drawHearts(player.hp,player.maxhp);bossBar('DRAGÃO DO MOA — GUARDIÃO ESQUECIDO',d.hp,d.max);}
    ctx.drawImage(vignImg(),0,0);
    ctx.fillStyle='rgba(20,30,60,.12)';ctx.fillRect(0,0,W,H);
  }
};
/* ============================================================
   FINAL — O ACRE EXISTE
   ============================================================ */
SC.ending={
  enter(){
    this.s={t:0,hatched:false,babies:[],cracks:0};
    musicSet('win');
    stats.final=stats.time;
  },
  update(dt){
    const s=this.s;s.t+=dt;
    if(s.t>10&&!s.hatched){s.hatched=true;sfx('crack');sfx('egg');
      for(let i=0;i<6;i++)s.babies.push({x:W*.36+i*36,ph:rnd(9)});}
    if(s.t>13.5&&IN.advP()){
      stats.time=0;stats.deaths=0;stats.eggs=0;stats.tamed=0;GAME.caveIntro=0;
      player.hasStaff=false;player.hasStick=false;
      player.skills={shot:false,shield:false,dash:false};
      goScene('title');
    }
  },
  draw(){
    const s=this.s,k=Math.min(1,s.t/6);
    skyRect(ctx,W,H,[[0,PAL.dawn.skyT],[.5,PAL.dawn.skyM],[1,PAL.dawn.skyB]]);
    drawSun(W*.5,H*.62-k*110,52,PAL.dawn.sun);
    godRays(.12);
    // colina
    ctx.fillStyle='#1d3028';ctx.beginPath();
    ctx.moveTo(0,H);ctx.quadraticCurveTo(W*.5,H*.52,W,H);ctx.closePath();ctx.fill();
    const hy=H*.72;
    // Rex Rei sentado (silhueta com coroa amassada)
    ctx.save();ctx.translate(W*.66,hy+10);ctx.scale(-1.5,1.5);
    ctx.fillStyle='#12201a';
    ctx.beginPath();ctx.ellipse(0,-30,34,26,-.2,0,TAU);ctx.fill();
    ctx.beginPath();ctx.moveTo(-20,-44);ctx.quadraticCurveTo(-10,-78,16,-84);ctx.quadraticCurveTo(30,-86,34,-78);ctx.quadraticCurveTo(36,-66,22,-62);ctx.quadraticCurveTo(6,-58,2,-40);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(20,-16);ctx.quadraticCurveTo(64,-10,86,-26);ctx.quadraticCurveTo(60,0,24,-4);ctx.closePath();ctx.fill();
    ctx.restore();
    drawCrown(W*.66-52,hy-118,-.3,2.2);
    // Mamãe Rex ao fundo
    drawRex(W*.87,hy+16,T*.5,-1,{s:1.1,col:'#16241c',colD:'#101c15',belly:'#1d2c22',mouth:.05});
    // Zé sentado com café
    ctx.save();ctx.translate(W*.3,hy);
    ctx.fillStyle='#10201a';
    ctx.beginPath();ctx.ellipse(0,-14,9,13,0,0,TAU);ctx.fill(); // corpo
    ctx.beginPath();ctx.arc(1,-31,7,0,TAU);ctx.fill(); // cabeça
    ctx.fillStyle='#0d1a15';ctx.beginPath();ctx.ellipse(1,-36,11,3,0,0,TAU);ctx.fill(); // chapéu
    ctx.beginPath();ctx.ellipse(0,-34.5,6,4,0,Math.PI,TAU);ctx.fill();
    ctx.strokeStyle='#10201a';ctx.lineWidth=4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(4,-18);ctx.lineTo(14,-22);ctx.stroke(); // braço com caneca
    ctx.beginPath();ctx.moveTo(-2,-2);ctx.lineTo(10,2);ctx.stroke(); // pernas
    ctx.beginPath();ctx.moveTo(-2,-2);ctx.lineTo(6,4);ctx.stroke();
    ctx.fillStyle='#e8dcc0';rr(12,-28,8,8,2);ctx.fill(); // caneca
    ctx.restore();
    // vapor do café
    if((T*4|0)%2===0)puff({x:W*.3+16,y:hy-30,vx:rnd(-6,6),vy:-26,r:rnd(2,4),life:1.4,col:'rgba(255,255,255,.25)'});
    // ovos / filhotes
    if(!s.hatched){for(let i=0;i<6;i++){const ex=W*.36+i*36,sh2=s.t>8?Math.sin(T*26+i)*2.4:0;
      drawEgg(ex+sh2,hy+4,1.6);}}
    else for(const bb of s.babies)drawBabyRex(bb.x,hy+8,T+bb.ph,1.1,'#10201a');
    drawP(true);drawP(false);
    // tucano
    drawToucan(W*.14+Math.sin(T*.4)*10,H*.2+Math.sin(T*.9)*8,T,.9);
    // textos
    const lines=[[0,'O feitiço se desfez.'],[3.2,'No resto do Brasil, milhões de pessoas abriram o mapa e disseram:'],[6.6,'"...uai. O Acre existe MESMO."'],[10,'Ah, os ovos? Chocaram. A dona Rex deixou o Zé ser padrinho.']];
    for(const[t0,tx]of lines){
      if(s.t>t0&&s.t<t0+3.4){const a=Math.min(1,(s.t-t0)*2)*Math.min(1,(t0+3.4-s.t));
        txt(tx,W/2,H*.2,{s:21,w:'700',c:'#fff',st:'rgba(0,0,0,.5)',stw:5,al:a,f:'Georgia,serif'});}
    }
    if(s.t>13.5){
      txt('O ACRE EXISTE.',W/2,H*.34,{s:52,w:'900',c:'#fff',st:'rgba(20,30,20,.8)',stw:10,f:"Impact,'Arial Black',sans-serif"});
      txt('E RESISTE.',W/2,H*.44,{s:24,w:'900',c:'#ffd166',st:'rgba(0,0,0,.5)',stw:6,f:"Impact,'Arial Black',sans-serif"});
      const mm=(stats.final/60|0),ss=(stats.final%60|0);
      txt('tempo: '+mm+'m '+(ss<10?'0':'')+ss+'s   ·   tombos: '+stats.deaths+'   ·   ovos: '+stats.eggs+'   ·   compys dominadas: '+(stats.tamed||0),W/2,H*.53,{s:15,c:'#e8e2d0'});
      txt('ACRE SIMULATOR — feito inteirinho em um arquivo, com carinho e açaí',W/2,H*.6,{s:12,c:'rgba(255,255,255,.6)'});
      if((s.t%1.2)<.7)txt('ESPAÇO — voltar ao título',W/2,H*.68,{s:14,w:'700',c:'#fff'});
    }
    ctx.drawImage(vignImg(),0,0);
  }
};

/* ---------------- loop principal ---------------- */
let last=0,T=0,paused=false;
function baseTransform(){ctx.setTransform(cv.width/W,0,0,cv.height/H,0,0);}
function safeRestoreAll(){try{for(let i=0;i<10;i++)ctx.restore();}catch(_e){}baseTransform();}
function loop(ts){
  requestAnimationFrame(loop);
  baseTransform(); // base absoluta todo frame: transform nunca acumula
  const raw=Math.min(Math.max((ts-last)/1000,0),.05);last=ts;
  musicTick();pollPad();
  if(paused){try{if(scene)scene.draw();}catch(e){logErr('[pause]',e);safeRestoreAll();}
    ctx.fillStyle='rgba(4,6,10,.72)';ctx.fillRect(0,0,W,H);
    txt('PAUSADO',W/2,H/2-10,{s:44,w:'900',c:'#fff',f:"Impact,'Arial Black',sans-serif"});
    txt('P para continuar · M som · F tela cheia',W/2,H/2+34,{s:14,c:'#ffd166'});
    for(const k in KP)KP[k]=0;return;}
  let dt=raw*timeScale;
  if(hitPause>0){hitPause-=raw;dt=0;}
  T+=dt;
  if(sceneName!=='title'&&sceneName!=='ending'&&sceneName!=='intro')stats.time+=raw;
  try{
    if(itemPop)updItem(raw);
    else if(dlg)updDlg(raw);
    else if(scene)scene.update(dt);
  }catch(e){logErr('[update]',e);}
  updP(dt);
  cam.shake=Math.max(0,cam.shake-raw*(cam.shake*5+3));
  zoomV+=(zoomTgt-zoomV)*Math.min(1,raw*16);zoomTgt+=(1-zoomTgt)*Math.min(1,raw*5);
  const zx=zoomV>1.002;
  if(zx){ctx.save();ctx.translate(W/2,H*.56);ctx.scale(zoomV,zoomV);ctx.translate(-W/2,-H*.56);}
  try{if(scene)scene.draw();}catch(e){logErr('[draw]',e);safeRestoreAll();}
  if(zx)safeRestoreAll();
  const cineTgt=(dlg||itemPop)?1:0;cine+=(cineTgt-cine)*Math.min(1,raw*7);
  if(cine>.01){ctx.fillStyle='#04050a';ctx.fillRect(0,0,W,46*cine);ctx.fillRect(0,H-46*cine,W,46*cine);}
  drawBanner(raw);drawHint();drawTouchUI();
  if(dlg)drawDlg();
  if(itemPop)drawItem();
  if(flashV>0){ctx.globalAlpha=Math.min(1,flashV);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;flashV-=raw*2.4;}
  updFade(raw);
  if(fadeV>0){ // transição íris centrada no Zé
    const useP=player.wld&&['eggs','chase','cave','wizard','training','boss'].includes(sceneName);
    const px=useP?clamp(player.x-cam.x,40,W-40):W/2,py=useP?clamp(player.y-36-cam.y,40,H-40):H/2;
    const r=Math.max(0,(1-ease(clamp(fadeV,0,1)))*1180);
    ctx.fillStyle='#04050a';
    ctx.beginPath();ctx.rect(0,0,W,H);ctx.arc(px,py,r,0,TAU);ctx.fill('evenodd');
    if(r>2&&r<1150){ctx.strokeStyle='rgba(255,209,102,'+(.55*clamp(fadeV*2,0,1)).toFixed(3)+')';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(px,py,r,0,TAU);ctx.stroke();}
  }
  if(lastErr&&T-lastErrT<12){
    ctx.save();ctx.globalAlpha=.85;ctx.font='700 10px Verdana';ctx.textAlign='left';ctx.textBaseline='bottom';
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(4,H-18,Math.min(W-8,ctx.measureText(lastErr).width+64),14);
    ctx.fillStyle='#ff8f8f';ctx.fillText('⚠ '+lastErr.slice(0,110)+' (tira print!)',8,H-6);ctx.restore();
  }
  for(const k in KP)KP[k]=0;
}
resize();
setScene('title');
requestAnimationFrame(loop);
</script>
